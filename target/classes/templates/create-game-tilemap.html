<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>地图编辑</title>
    <link rel="stylesheet" th:href="@{/static/css/tilemap-editor.css}">
</head>
<body>
    <div layout:fragment="content">
        <!-- 返回按钮 -->
        <div style="padding: 20px; display: flex; gap: 10px;">
            <a href="/create-game" class="back-button" style="color: #a0a1a2; text-decoration: none; font-size: 14px; padding: 8px 16px;">← 返回创作游戏</a>
        </div>

        <!-- 嵌入 Tilemap 编辑器 -->
        <div th:replace="~{tilemap-editor :: content}"></div>
    </div>

    <!-- Tilemap 编辑器脚本 -->
    <script th:src="@{/static/js/tilemap-editor.js}"></script>
</body>
</html>
