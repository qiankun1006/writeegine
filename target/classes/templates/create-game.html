<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>创作游戏</title>
    <link rel="stylesheet" th:href="@{/static/css/game-creation.css}">
</head>
<body>
    <div layout:fragment="content">
        <div class="game-creation-wrapper">
            <!-- 页面头部 -->
            <div class="creation-header">
                <h1>创作游戏</h1>
                <a href="/" class="back-button">← 返回首页</a>
            </div>

            <!-- 功能入口选择 -->
            <div class="editor-selector">
                <h2>选择编辑器</h2>
                <div class="editor-options">
                    <!-- 地图编辑入口 -->
                    <a href="/create-game/tilemap" class="editor-card">
                        <div class="editor-icon">🗺️</div>
                        <h3>地图编辑</h3>
                        <p>创建和编辑游戏地图，放置地块和设计关卡</p>
                    </a>

                    <!-- 图片编辑入口 -->
                    <a href="/create-game/image" class="editor-card">
                        <div class="editor-icon">🖼️</div>
                        <h3>图片编辑</h3>
                        <p>编辑游戏精灵图和纹理资源</p>
                    </a>

                    <!-- Unity 编辑器入口 -->
                    <a href="/create-game/unity" class="editor-card">
                        <div class="editor-icon">🎮</div>
                        <h3>Unity 编辑器</h3>
                        <p>创建和编辑 3D 游戏场景，添加物理效果</p>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
