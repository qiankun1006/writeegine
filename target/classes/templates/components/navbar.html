<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- 通用导航栏组件 -->
    <nav class="app-navbar" th:fragment="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="/" class="brand-link">✨ WriteMyself</a>
            </div>
            <div class="navbar-links">
                <a href="/" class="navbar-link" th:classappend="${title.contains('首页') ? 'active' : ''}">首页</a>
                <a href="/my-games" class="navbar-link" th:classappend="${title.contains('我的游戏') ? 'active' : ''}">我的游戏</a>
                <a href="/game-plaza" class="navbar-link" th:classappend="${title.contains('游戏广场') ? 'active' : ''}">游戏广场</a>
            </div>
        </div>
    </nav>

    <style>
        .app-navbar {
            background: rgba(26, 31, 46, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .brand-link:hover {
            transform: scale(1.05);
        }

        .navbar-links {
            display: flex;
            gap: 20px;
        }

        .navbar-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .navbar-link:hover,
        .navbar-link.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        @media (max-width: 768px) {
            .navbar-container {
                flex-direction: column;
                gap: 15px;
            }

            .navbar-links {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</body>
</html>
