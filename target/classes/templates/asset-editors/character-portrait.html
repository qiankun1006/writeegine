<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="~{layout}">
<head>
    <title>AI 人物立绘生成器</title>
    <link rel="stylesheet" th:href="@{/static/ai-portrait-generator/dist/assets/style.css}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 确保应用占满整个页面 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .portrait-app-root {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <!-- Vue 应用根节点 -->
        <div id="app" class="portrait-app-root"></div>

        <!-- Vue 应用脚本 -->
        <script type="module">
            // 确保导入 ES 模块
            import('./../../static/ai-portrait-generator/dist/assets/main.js').catch(err => {
                console.error('Failed to load AI portrait generator:', err);
                document.getElementById('app').innerHTML = '<div style="padding: 20px; color: red;">应用加载失败，请重新刷新页面</div>';
            });
        </script>
    </div>
</body>
</html>
