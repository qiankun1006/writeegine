<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="~{layout}">
<head>
    <title>动画帧序列编辑</title>
    <link rel="stylesheet" th:href="@{/static/css/skeleton-animation.css}">

    <!-- 骨骼动画编辑器页面初始化 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🎬 【动画帧序列编辑】页面加载完成，开始初始化骨骼动画编辑器...');

            // 检查骨骼动画编辑器页面初始化函数是否存在
            if (typeof initFrameSequenceEditor === 'function') {
                console.log('✓ initFrameSequenceEditor 函数已加载');
                initFrameSequenceEditor();
            } else {
                console.error('❌ initFrameSequenceEditor 函数未找到，请检查 FrameSequenceEditor.js 是否正确加载');
            }
        });

        // 全局保存函数
        window.saveAsset = function() {
            console.log('💾 保存动画资源...');
            if (window.skeletonEditor && typeof window.skeletonEditor.save === 'function') {
                try {
                    window.skeletonEditor.save();
                    alert('✓ 动画已保存！');
                } catch (error) {
                    console.error('保存失败:', error);
                    alert('✗ 保存失败，请查看控制台日志');
                }
            } else {
                alert('⏳ 编辑器还在加载中，请稍候...');
            }
        };
    </script>

    <style>
        .editor-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f5f5f5;
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .editor-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .back-button, .save-button {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .back-button:hover, .save-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .save-button {
            background: rgba(76, 175, 80, 0.3);
        }

        .save-button:hover {
            background: rgba(76, 175, 80, 0.5);
        }

        .editor-container {
            flex: 1;
            overflow: hidden;
            display: flex;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="editor-wrapper">
            <!-- 头部 -->
            <div class="editor-header">
                <h1>🎬 动画帧序列编辑</h1>
                <div class="header-buttons">
                    <button class="save-button" onclick="saveAsset()">💾 保存</button>
                    <a href="/create-game/asset" class="back-button">← 返回</a>
                </div>
            </div>

            <!-- 编辑器容器 -->
            <div class="editor-container">
                <div class="skeleton-animation-editor" id="skeleton-animation-editor">
                    <!-- 骨骼动画编辑器将由 JS 动态初始化 -->
                </div>
            </div>
        </div>
    </div>
</body>
</html>
