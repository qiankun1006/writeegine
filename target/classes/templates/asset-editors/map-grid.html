<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="~{layout}">
<head>
    <title>游戏地图编辑</title>
    <link rel="stylesheet" th:href="@{/static/css/tilemap-editor.css}">
    <link rel="stylesheet" th:href="@{/static/css/game-map-editor.css}">
</head>
<body>
    <div layout:fragment="content">
        <div class="game-map-editor-container">
            <!-- 左侧：Tilemap编辑器 -->
            <div class="left-panel">
                <div class="panel-header">
                    <h2>地图草图编辑器</h2>
                    <div style="font-size: 14px; color: #6c757d;">
                        使用图块绘制地图轮廓，作为AI生成的参考
                    </div>
                </div>
                <!-- 嵌入完整的 Tilemap 编辑器 -->
                <div th:replace="~{tilemap-editor :: content}"></div>
            </div>

            <!-- 可拖动分隔符 -->
            <div class="resizer" id="panel-resizer"></div>

            <!-- 右侧：AI参数面板 -->
            <div class="right-panel">
                <div class="panel-header">
                    <h2>AI地图生成</h2>
                    <div style="font-size: 14px; color: #6c757d;">
                        设置参数，生成专业级游戏地图
                    </div>
                </div>

                <!-- AI参数输入区域 -->
                <div class="ai-params-section">
                    <div class="section-title">
                        <i>🎨</i> 风格设置
                    </div>

                    <div class="param-group">
                        <label class="param-label">地图风格</label>
                        <select class="param-select" id="style-select">
                            <option value="fantasy">奇幻风格</option>
                            <option value="sci-fi">科幻风格</option>
                            <option value="medieval">中世纪风格</option>
                            <option value="modern">现代风格</option>
                            <option value="cyberpunk">赛博朋克</option>
                            <option value="steampunk">蒸汽朋克</option>
                        </select>
                    </div>

                    <div class="param-group">
                        <label class="param-label">地图尺寸</label>
                        <select class="param-select" id="size-select">
                            <option value="small">小型 (512×512)</option>
                            <option value="medium" selected>中型 (1024×1024)</option>
                            <option value="large">大型 (2048×2048)</option>
                            <option value="custom">自定义尺寸</option>
                        </select>
                    </div>
                </div>

                <div class="ai-params-section">
                    <div class="section-title">
                        <i>🎮</i> 游戏设置
                    </div>

                    <div class="param-group">
                        <label class="param-label">游戏类型</label>
                        <select class="param-select" id="game-type-select">
                            <option value="rpg">角色扮演 (RPG)</option>
                            <option value="strategy">策略/战棋</option>
                            <option value="platform">平台跳跃</option>
                            <option value="sandbox">沙盒游戏</option>
                            <option value="adventure">冒险游戏</option>
                            <option value="puzzle">解谜游戏</option>
                        </select>
                    </div>

                    <div class="param-group">
                        <label class="param-label">微调模型</label>
                        <select class="param-select" id="model-select">
                            <option value="base">基础模型 (快速生成)</option>
                            <option value="pro" selected>专业模型 (高质量)</option>
                            <option value="custom">定制模型 (需要授权)</option>
                        </select>
                    </div>
                </div>

                <div class="ai-params-section">
                    <div class="section-title">
                        <i>📷</i> 参考图片
                    </div>

                    <div class="file-upload-area" id="reference-upload">
                        <i>📁</i>
                        <div class="file-upload-text">点击上传参考图片</div>
                        <div class="file-upload-hint">支持 JPG、PNG 格式，最大 5MB</div>
                        <input type="file" id="reference-file" accept="image/*" style="display: none;">
                    </div>
                    <div id="reference-preview" style="margin-top: 10px; display: none;">
                        <img id="reference-image" style="max-width: 100%; max-height: 150px; border-radius: 4px;">
                        <button onclick="clearReference()" style="margin-top: 5px; padding: 4px 8px; font-size: 12px; background: #dc3545; color: white; border: none; border-radius: 3px; cursor: pointer;">移除</button>
                    </div>
                </div>

                <!-- 生成按钮 -->
                <button class="generate-btn" id="generate-btn" onclick="generateGameMap()">
                    🚀 生成游戏地图
                </button>

                <!-- 状态指示器 -->
                <div class="status-indicator" id="status-indicator">
                    <div id="status-message"></div>
                    <div id="progress-bar" style="margin-top: 8px; height: 4px; background: #e9ecef; border-radius: 2px; overflow: hidden;">
                        <div id="progress-fill" style="height: 100%; background: #007bff; width: 0%; transition: width 0.3s;"></div>
                    </div>
                </div>

                <!-- 结果预览 -->
                <div class="result-preview" id="result-preview">
                    <img id="generated-map" src="" alt="生成的地图">
                    <div style="padding: 15px;">
                        <div style="font-weight: 600; margin-bottom: 10px;">生成结果</div>
                        <div style="font-size: 14px; color: #6c757d; margin-bottom: 15px;">
                            基于您的草图生成的AI地图
                        </div>
                        <div class="result-actions">
                            <button class="result-btn btn-download" onclick="downloadMap()">
                                ⬇️ 下载地图
                            </button>
                            <button class="result-btn btn-regenerate" onclick="regenerateMap()">
                                🔄 重新生成
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入游戏地图生成器JavaScript文件 -->
    <script th:src="@{/static/js/game-map-generator/ai-params-panel.js}"></script>
    <script th:src="@{/static/js/game-map-generator/sketch-converter.js}"></script>
    <script th:src="@{/static/js/game-map-generator/api-client.js}"></script>
    <script th:src="@{/static/js/game-map-generator/result-preview.js}"></script>
    <script th:src="@{/static/js/game-map-generator/app.js}"></script>

    <!-- 简单的初始化脚本 -->
    <script>
        // 添加返回按钮到 Tilemap 编辑器
        window.addEventListener('load', function() {
            const header = document.querySelector('.tilemap-header');
            if (header && !document.querySelector('.tilemap-back-btn')) {
                const backBtn = document.createElement('a');
                backBtn.href = '/create-game/asset';
                backBtn.className = 'tilemap-back-btn';
                backBtn.innerHTML = '← 返回素材中心';
                backBtn.style.cssText = 'position: absolute; right: 120px; padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 4px; font-size: 14px;';
                header.appendChild(backBtn);
            }
        });

        // 简单的参考图片上传处理
        document.getElementById('reference-upload').addEventListener('click', function() {
            document.getElementById('reference-file').click();
        });

        document.getElementById('reference-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('文件大小不能超过5MB');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('reference-image').src = event.target.result;
                    document.getElementById('reference-preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function clearReference() {
            document.getElementById('reference-file').value = '';
            document.getElementById('reference-preview').style.display = 'none';
        }

        // 简单的面板大小调整
        let isResizing = false;
        const resizer = document.getElementById('panel-resizer');
        const leftPanel = document.querySelector('.left-panel');
        const rightPanel = document.querySelector('.right-panel');

        if (resizer && leftPanel && rightPanel) {
            resizer.addEventListener('mousedown', function(e) {
                isResizing = true;
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
            });

            function handleMouseMove(e) {
                if (!isResizing) return;

                const containerWidth = document.querySelector('.game-map-editor-container').offsetWidth;
                const minLeftWidth = 400;
                const minRightWidth = 300;

                let leftWidth = e.clientX;
                let rightWidth = containerWidth - leftWidth - 8;

                if (leftWidth < minLeftWidth) leftWidth = minLeftWidth;
                if (rightWidth < minRightWidth) {
                    leftWidth = containerWidth - minRightWidth - 8;
                    rightWidth = minRightWidth;
                }

                leftPanel.style.flex = `0 0 ${leftWidth}px`;
                rightPanel.style.flex = `0 0 ${rightWidth}px`;
            }

            function handleMouseUp() {
                isResizing = false;
                document.removeEventListener('mousemove', handleMouseMove);
                document.removeEventListener('mouseup', handleMouseUp);
            }
        }
    </script>
</body>
</html>
