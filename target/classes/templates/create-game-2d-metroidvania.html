<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 恶魔城编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 500;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #0078d4;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #1084d7;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .toolbar {
            background: #252526;
            border-right: 1px solid #3e3e42;
            padding: 10px;
            width: 120px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .tool-btn {
            background: #3e3e42;
            color: #cccccc;
            border: 1px solid #3e3e42;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: #3e3e42;
            color: #fff;
            border-color: #0078d4;
        }

        .tool-btn.active {
            background: #0078d4;
            color: #fff;
            border-color: #0078d4;
        }

        .canvas-container {
            flex: 1;
            background: #f5f5f5;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        .properties {
            background: #252526;
            border-left: 1px solid #3e3e42;
            width: 280px;
            overflow-y: auto;
            padding: 10px;
            border-top: 1px solid #3e3e42;
        }

        .property-group {
            margin-bottom: 12px;
        }

        .property-group label {
            display: block;
            font-size: 12px;
            color: #cccccc;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .property-group input,
        .property-group select {
            width: 100%;
            padding: 6px;
            background: #3e3e42;
            border: 1px solid #3e3e42;
            color: #fff;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
        }

        .property-group input:focus,
        .property-group select:focus {
            outline: none;
            border-color: #0078d4;
        }

        #propertyPanel {
            color: #cccccc;
            font-size: 12px;
        }

        .footer {
            background: #2d2d30;
            border-top: 1px solid #3e3e42;
            padding: 5px 20px;
            height: 25px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #858585;
        }

        #statusBar {
            flex: 1;
        }

        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: #0078d4;
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🏰 2D 恶魔城编辑器</h1>
            <div class="header-buttons">
                <button class="btn" onclick="editor.saveGame()">💾 保存</button>
                <button class="btn" onclick="window.history.back()">← 返回</button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="section-title">编辑工具</div>
                <button class="tool-btn active" onclick="editor.selectTool('select')" title="选择">✓ 选择</button>
                <button class="tool-btn" onclick="editor.selectTool('platform')" title="平台">━ 平台</button>
                <button class="tool-btn" onclick="editor.selectTool('spike')" title="尖刺">✕ 尖刺</button>
                <button class="tool-btn" onclick="editor.selectTool('enemy')" title="敌人">👾 敌人</button>

                <div class="section-title">物理</div>
                <button class="tool-btn" onclick="editor.togglePhysicsPreview()" title="物理预览">🔬 物理</button>
                <button class="tool-btn" onclick="editor.toggleCollisionBodies()" title="碰撞体">📦 碰撞</button>

                <div class="section-title">编辑</div>
                <button class="tool-btn" onclick="editor.undo()" title="撤销">↶ 撤销</button>
                <button class="tool-btn" onclick="editor.redo()" title="重做">↷ 重做</button>
            </div>

            <!-- 画布区 -->
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
            </div>

            <!-- 属性面板 -->
            <div class="properties">
                <div class="section-title">属性</div>
                <div id="propertyPanel">
                    <p>选择一个对象以编辑属性</p>
                </div>
            </div>
        </div>

        <!-- 底部状态栏 -->
        <div class="footer">
            <div id="statusBar">准备就绪</div>
        </div>
    </div>

    <!-- 加载脚本 -->
    <script src="/static/js/unity-editor/Canvas2DUtils.js"></script>
    <script src="/static/js/unity-editor/BaseEditor2D.js"></script>
    <script src="/static/js/unity-editor/EditorFactory.js"></script>

    <script>
        let editor = null;

        // 2D 恶魔城编辑器类
        class Metroidvania2DEditor extends BaseEditor2D {
            async initializeTools() {
                console.log('🏰 初始化恶魔城编辑器工具');
                this.currentTool = 'select';
                this.showPhysicsPreview = false;
                this.showCollisionBodies = true;
                this.gravity = 0.5;
                this.friction = 0.95;
            }

            initializeUI() {
                // 初始化 UI
            }

            selectTool(toolName) {
                this.currentTool = toolName;
                console.log(`🔧 选择工具: ${toolName}`);

                // 更新按钮状态
                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');

                // 根据工具绑定画布点击事件
                const canvas = this.canvas;
                canvas.onclick = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX - rect.left - this.panX) / this.zoom;
                    const y = (e.clientY - rect.top - this.panY) / this.zoom;

                    switch (toolName) {
                        case 'platform':
                            this.createPlatform(x, y);
                            break;
                        case 'spike':
                            this.createSpike(x, y);
                            break;
                        case 'enemy':
                            this.createEnemy(x, y);
                            break;
                    }
                };
            }

            createPlatform(x, y) {
                const platform = {
                    id: this.generateId(),
                    x,
                    y,
                    width: 64,
                    height: 16,
                    type: 'platform',
                    color: '#8b4513',
                    rigidBody: { type: 'static', mass: 0 }
                };
                this.objects.push(platform);
                this.selectObject(platform);
                this.saveUndoState();
                console.log('━ 平台已创建');
            }

            createSpike(x, y) {
                const spike = {
                    id: this.generateId(),
                    x,
                    y,
                    width: 16,
                    height: 16,
                    type: 'spike',
                    color: '#e74c3c',
                    damage: 10
                };
                this.objects.push(spike);
                this.selectObject(spike);
                this.saveUndoState();
                console.log('✕ 尖刺已创建');
            }

            createEnemy(x, y) {
                const enemy = {
                    id: this.generateId(),
                    x,
                    y,
                    width: 32,
                    height: 32,
                    type: 'enemy',
                    color: '#9b59b6',
                    health: 10,
                    speed: 2,
                    patrolDistance: 100
                };
                this.objects.push(enemy);
                this.selectObject(enemy);
                this.saveUndoState();
                console.log('👾 敌人已创建');
            }

            togglePhysicsPreview() {
                this.showPhysicsPreview = !this.showPhysicsPreview;
                console.log(`🔬 物理预览: ${this.showPhysicsPreview ? '开启' : '关闭'}`);
            }

            toggleCollisionBodies() {
                this.showCollisionBodies = !this.showCollisionBodies;
                console.log(`📦 碰撞体: ${this.showCollisionBodies ? '显示' : '隐藏'}`);
            }

            render() {
                // 保存当前变换状态
                this.ctx.save();

                // 清空画布
                Canvas2DUtils.clearCanvas(this.canvas);

                // 应用变换
                this.ctx.translate(this.panX, this.panY);
                this.ctx.scale(this.zoom, this.zoom);

                // 绘制网格
                Canvas2DUtils.drawGrid(
                    this.ctx,
                    this.canvas.width / this.zoom,
                    this.canvas.height / this.zoom,
                    16
                );

                // 绘制对象
                this.objects.forEach(obj => {
                    const isSelected = obj === this.selectedObject;

                    Canvas2DUtils.drawRect(
                        this.ctx,
                        obj.x, obj.y, obj.width, obj.height,
                        obj.color,
                        isSelected ? '#333' : null,
                        isSelected ? 2 : 0
                    );

                    // 绘制碰撞体框（如果启用）
                    if (this.showCollisionBodies && obj.rigidBody) {
                        this.ctx.strokeStyle = '#0078d4';
                        this.ctx.lineWidth = 1;
                        this.ctx.globalAlpha = 0.3;
                        this.ctx.strokeRect(obj.x - 2, obj.y - 2, obj.width + 4, obj.height + 4);
                        this.ctx.globalAlpha = 1;
                    }
                });

                // 绘制重力指示器（如果启用物理预览）
                if (this.showPhysicsPreview) {
                    this.ctx.strokeStyle = '#ff9800';
                    this.ctx.lineWidth = 2;
                    this.ctx.globalAlpha = 0.3;
                    Canvas2DUtils.drawLine(
                        this.ctx,
                        0, 0,
                        0, 100,
                        '#ff9800',
                        2
                    );
                    this.ctx.globalAlpha = 1;
                }

                // 恢复变换状态
                this.ctx.restore();

                // 绘制 UI 信息
                this.renderUI();
            }
        }

        // 页面加载完成后初始化编辑器
        window.addEventListener('DOMContentLoaded', async () => {
            // 获取游戏 ID（从 URL 参数或新游戏）
            const params = new URLSearchParams(window.location.search);
            const gameId = params.get('gameId');

            // 创建编辑器实例
            editor = new Metroidvania2DEditor(
                {
                    name: '2D 恶魔城编辑器',
                    engine: 'canvas2d',
                    tools: ['collision-editor', 'physics-preview', 'platformer'],
                    canvasSize: { width: window.innerWidth - 400, height: window.innerHeight - 80 },
                    gridSize: 16,
                    initialZoom: 1.0
                },
                gameId
            );

            // 初始化编辑器
            const initialized = await editor.initialize();
            if (initialized) {
                console.log('🏰 恶魔城编辑器已启动');
            }
        });

        // 窗口大小调整时重新计算画布大小
        window.addEventListener('resize', () => {
            if (editor && editor.canvas) {
                editor.canvas.width = window.innerWidth - 400;
                editor.canvas.height = window.innerHeight - 80;
            }
        });

        // 提示用户保存
        window.addEventListener('beforeunload', (e) => {
            if (editor && editor.undoStack.length > 0) {
                e.preventDefault();
                e.returnValue = '您有未保存的更改';
            }
        });
    </script>
</body>
</html>
