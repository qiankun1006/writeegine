<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>错误页面</title>
    <style>
        .error-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
        }
        .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #e74c3c;
            margin: 20px 0;
        }
        .error-message {
            font-size: 24px;
            color: #2c3e50;
            margin: 20px 0;
        }
        .error-description {
            font-size: 16px;
            color: #7f8c8d;
            margin: 20px 0;
        }
        .error-timestamp {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 20px;
        }
        .action-buttons {
            margin-top: 30px;
        }
        .btn-home {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin: 0 10px;
            transition: background 0.3s ease;
        }
        .btn-home:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="error-container">
            <div class="error-code" th:text="${status}">500</div>
            <div class="error-message" th:text="${error}">出错了</div>
            <div class="error-description" th:text="${message}">
                请求处理过程中出现了一个错误
            </div>

            <div class="action-buttons">
                <a href="/" class="btn-home">返回首页</a>
            </div>

            <div class="error-timestamp">
                <p th:if="${timestamp}">
                    时间: <span th:text="${#temporals.format(timestamp, 'yyyy-MM-dd HH:mm:ss')}"></span>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
