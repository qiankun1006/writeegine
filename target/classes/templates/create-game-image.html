<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片编辑器 - WriteEngine</title>
  <link rel="stylesheet" href="/static/css/image-editor.css">
</head>
<body>
  <div class="image-editor-container">
    <!-- 顶部菜单栏 -->
    <div class="menu-bar">
      <div class="menu-group">
        <button class="menu-btn" id="menuFile">文件</button>
        <button class="menu-btn" id="menuEdit">编辑</button>
        <button class="menu-btn" id="menuImage">图像</button>
        <button class="menu-btn" id="menuLayer">图层</button>
        <button class="menu-btn" id="menuSelect">选择</button>
        <button class="menu-btn" id="menuFilter">滤镜</button>
        <button class="menu-btn" id="menuView">查看</button>
      </div>

      <div class="zoom-control">
        <button id="zoomOut" class="zoom-btn" title="缩小">−</button>
        <input type="number" id="zoomLevel" class="zoom-input" value="100" min="10" max="1000">
        <span class="zoom-label">%</span>
        <button id="zoomIn" class="zoom-btn" title="放大">+</button>
        <button id="fitWindow" class="zoom-btn" title="适应窗口">适应</button>
      </div>
    </div>

    <!-- 主工作区 -->
    <div class="workspace">
      <!-- 工具栏 -->
      <div class="toolbar">
        <div class="tool-group">
          <button class="tool-btn" id="rect-select-btn" data-tool="rect-select" title="矩形选择 (R)">⬜</button>
          <button class="tool-btn" id="ellipse-select-btn" data-tool="ellipse-select" title="椭圆选择 (E)">⭕</button>
        </div>

        <div class="tool-separator"></div>

        <div class="tool-group">
          <button class="tool-btn active" id="brush-btn" data-tool="brush" title="画笔 (B)">🖌️</button>
          <button class="tool-btn" id="pencil-btn" data-tool="pencil" title="铅笔 (P)">✏️</button>
          <button class="tool-btn" id="eraser-btn" data-tool="eraser" title="橡皮 (E)">🧹</button>
        </div>

        <div class="tool-separator"></div>

        <div class="tool-group">
          <button class="tool-btn" id="free-transform-btn" data-tool="free-transform" title="自由变换 (T)">🔄</button>
          <button class="tool-btn" id="scale-btn" data-tool="scale" title="缩放 (S)">↔️</button>
          <button class="tool-btn" id="rotate-btn" data-tool="rotate" title="旋转 (R)">🔄</button>
          <button class="tool-btn" id="skew-btn" data-tool="skew" title="倾斜 (K)">🔀</button>
        </div>

        <div class="tool-separator"></div>

        <div class="tool-group">
          <button class="tool-btn" id="perspective-btn" data-tool="perspective" title="透视变换 (P)">🔲</button>
          <button class="tool-btn" id="3d-transform-btn" data-tool="3d-transform" title="3D 变换 (3)">📦</button>
        </div>

        <div class="tool-separator"></div>

        <div class="color-picker">
          <label>前景色</label>
          <input type="color" id="foregroundColor" value="#000000">
          <label style="margin-left: 10px;">背景色</label>
          <input type="color" id="backgroundColor" value="#ffffff">
        </div>
      </div>

      <!-- 左侧面板 -->
      <div class="left-panel">
        <!-- 图层面板 -->
        <div class="panel layers-panel">
          <div class="panel-header">
            <h3 class="panel-title">图层</h3>
          </div>
          <div class="panel-content">
            <div class="layers-list" id="layersList"></div>
            <div class="panel-buttons">
              <button id="addLayerBtn" class="btn-small" title="新建图层">➕ 新建</button>
              <button id="deleteLayerBtn" class="btn-small" title="删除图层">🗑️ 删除</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 中央画布区域 -->
      <div class="canvas-area">
        <canvas id="editorCanvas"></canvas>
      </div>

      <!-- 右侧面板 -->
      <div class="right-panel">
        <!-- 工具选项面板 -->
        <div class="panel tool-options-panel">
          <div class="panel-header">
            <h3 class="panel-title">工具选项</h3>
          </div>
          <div class="panel-content">
            <div id="toolOptions"></div>
          </div>
        </div>

        <!-- 历史记录面板 -->
        <div class="panel history-panel">
          <div class="panel-header">
            <h3 class="panel-title">历史记录</h3>
            <div class="panel-buttons">
              <button id="undoBtn" class="btn-icon" title="撤销 (Ctrl+Z)">↶</button>
              <button id="redoBtn" class="btn-icon" title="重做 (Ctrl+Y)">↷</button>
            </div>
          </div>
          <div class="panel-content">
            <div class="history-list" id="historyList"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="statusbar">
      <div class="status-item">
        <span id="coordsDisplay">X: 0, Y: 0</span>
      </div>
      <div class="status-item">
        <span id="sizeDisplay">宽: 800 × 高: 600</span>
      </div>
      <div class="status-item">
        <span id="layerInfoDisplay">图层: 1</span>
      </div>
      <div class="status-item" style="flex: 1;"></div>
      <div class="status-item">
        <button id="exportBtn" class="btn-small" title="导出图片">📥 导出</button>
        <button id="saveBtn" class="btn-small" title="保存文档">💾 保存</button>
      </div>
    </div>
  </div>

  <!-- 导出菜单 -->
  <div id="exportMenu" class="context-menu" style="display: none;">
    <button class="menu-item" data-format="png">导出为 PNG</button>
    <button class="menu-item" data-format="jpg">导出为 JPG</button>
  </div>

  <!-- 脚本加载 -->
  <script src="/static/js/image-editor/EventBus.js"></script>
  <script src="/static/js/image-editor/CommandHistory.js"></script>
  <script src="/static/js/image-editor/Layer.js"></script>
  <script src="/static/js/image-editor/Tool.js"></script>
  <script src="/static/js/image-editor/CanvasRenderer.js"></script>
  <script src="/static/js/image-editor/TooltipManager.js"></script>
  <script src="/static/js/image-editor/ImageEditor.js"></script>

  <!-- Phase 1 工具 -->
  <script src="/static/js/image-editor/tools/SelectionTools.js"></script>
  <script src="/static/js/image-editor/tools/PaintingTools.js"></script>

  <!-- Phase 2 工具 -->
  <script src="/static/js/image-editor/tools/AdvancedSelectionTools.js"></script>
  <script src="/static/js/image-editor/tools/AdvancedPaintingTools.js"></script>
  <script src="/static/js/image-editor/tools/FillTools.js"></script>
  <script src="/static/js/image-editor/tools/PenTool.js"></script>

  <!-- Phase 3 滤镜与特效系统 -->
  <script src="/static/js/image-editor/filters/FilterPipeline.js"></script>
  <script src="/static/js/image-editor/filters/BasicFilters.js"></script>
  <script src="/static/js/image-editor/filters/ColorAdjustments.js"></script>
  <script src="/static/js/image-editor/filters/LayerStyles.js"></script>
  <script src="/static/js/image-editor/filters/AdvancedFilters.js"></script>
  <script src="/static/js/image-editor/filters/EffectFilters.js"></script>

  <!-- Phase 4 变换与3D工具 -->
  <script src="/static/js/image-editor/tools/TransformTools.js"></script>
  <script src="/static/js/image-editor/tools/PerspectiveTool.js"></script>
  <script src="/static/js/image-editor/tools/ThreeDTransformTool.js"></script>

  <script src="/static/js/image-editor/app.js"></script>
  <script src="/static/js/image-editor/filters-test.js"></script>
  <script src="/static/js/image-editor/transform-test.js"></script>
</body>
</html>
