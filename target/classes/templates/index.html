<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">首页</title>
</head>
<body>
    <div layout:fragment="content">
        <h1 th:text="${message}">欢迎消息</h1>
        <p>这是一个使用Spring Boot和Thymeleaf构建的前后端不分离Web应用示例。</p>

        <section>
            <h2>功能特性</h2>
            <ul>
                <li>服务器端渲染HTML</li>
                <li>响应式设计</li>
                <li>静态资源支持</li>
                <li>易于扩展</li>
            </ul>
        </section>

        <section>
            <h2>快速开始</h2>
            <p>编辑 <code>src/main/resources/templates/</code> 中的HTML文件来修改页面内容。</p>
        </section>

        <!-- Thymeleaf语法示例 -->
        <section>
            <h2>Thymeleaf示例</h2>
            <p th:text="'当前时间: ' + ${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}">时间示例</p>
            <p th:if="${message != null}" th:text="'消息长度: ' + ${#strings.length(message)}">消息长度</p>
            <ul>
                <li th:each="i : ${#numbers.sequence(1, 3)}">
                    项目 <span th:text="${i}">1</span>
                </li>
            </ul>
        </section>
    </div>
</body>
</html>
