<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骨骼动画编辑器测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ccc;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 10px 20px;
            background-color: #2a2a2a;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 18px;
            color: #fff;
        }

        .test-controls {
            display: flex;
            gap: 10px;
        }

        .test-controls button {
            padding: 6px 12px;
            background-color: #3a3a3a;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 3px;
            cursor: pointer;
        }

        .test-controls button:hover {
            background-color: #4a4a4a;
        }

        .test-status {
            padding: 10px 20px;
            background-color: #0a0a0a;
            border-bottom: 1px solid #444;
            font-family: monospace;
            font-size: 12px;
        }

        .test-status.success {
            color: #00cc44;
        }

        .test-status.error {
            color: #ff4444;
        }

        .test-status.info {
            color: #0088ff;
        }

        .editor-container {
            flex: 1;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦴 骨骼动画编辑器测试</h1>
            <div class="test-controls">
                <button onclick="testClasses()">测试类加载</button>
                <button onclick="testInit()">测试初始化</button>
                <button onclick="testCreateBone()">测试创建骨骼</button>
                <button onclick="testAnimation()">测试动画</button>
                <button onclick="runAllTests()">运行所有测试</button>
            </div>
        </div>
        <div class="test-status" id="testStatus">准备就绪，点击按钮开始测试...</div>
        <div class="editor-container" id="skeleton-animation-editor"></div>
    </div>

    <!-- 加载骨骼动画系统脚本 -->
    <script src="/static/js/image-editor/skeleton/core/Matrix2D.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Bone.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Skeleton.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Keyframe.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Track.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Animation.js"></script>
    <script src="/static/js/image-editor/skeleton/core/AnimationPlayer.js"></script>
    <script src="/static/js/image-editor/skeleton/core/SkeletonCommands.js"></script>
    <script src="/static/js/image-editor/skeleton/core/ExportManager.js"></script>
    <script src="/static/js/image-editor/skeleton/ui/BoneHierarchyPanel.js"></script>
    <script src="/static/js/image-editor/skeleton/ui/Timeline.js"></script>
    <script src="/static/js/image-editor/skeleton/ui/BonePropertyPanel.js"></script>
    <script src="/static/js/image-editor/skeleton/ui/SkeletonAnimationEditor.js"></script>
    <script src="/static/js/image-editor/skeleton/tools/BoneEditTool.js"></script>
    <script src="/static/js/game-asset-creator/FrameSequenceEditor.js"></script>

    <link rel="stylesheet" href="/static/css/skeleton-animation.css">

    <script>
        let testResults = [];
        let skeletonEditor = null;

        function setStatus(message, type = 'info') {
            const statusEl = document.getElementById('testStatus');
            statusEl.textContent = message;
            statusEl.className = `test-status ${type}`;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function addTestResult(testName, passed, message) {
            testResults.push({
                name: testName,
                passed,
                message
            });
        }

        function printTestResults() {
            console.log('\n测试结果:');
            testResults.forEach(r => {
                console.log(`  ${r.passed ? '✅' : '❌'} ${r.name}: ${r.message}`);
            });
        }

        function testClasses() {
            setStatus('开始测试类加载...', 'info');
            testResults = [];

            const classes = [
                'Matrix2D',
                'Bone',
                'Skeleton',
                'Keyframe',
                'Track',
                'Animation',
                'AnimationPlayer',
                'SetBonePositionCommand',
                'ExportManager',
                'BoneHierarchyPanel',
                'Timeline',
                'BonePropertyPanel',
                'SkeletonAnimationEditor',
                'BoneEditTool'
            ];

            let allPassed = true;

            classes.forEach(className => {
                if (typeof window[className] === 'undefined') {
                    addTestResult(`类 ${className} 加载`, false, '未定义');
                    allPassed = false;
                    setStatus(`❌ 类 ${className} 未找到`, 'error');
                } else {
                    addTestResult(`类 ${className} 加载`, true, '已加载');
                    setStatus(`✅ 类 ${className} 已加载`, 'success');
                }
            });

            if (allPassed) {
                setStatus(`✅ 所有 ${classes.length} 个类已成功加载`, 'success');
            } else {
                setStatus(`❌ 部分类加载失败`, 'error');
            }

            printTestResults();
            return allPassed;
        }

        function testInit() {
            setStatus('开始测试初始化...', 'info');

            if (typeof SkeletonAnimationEditor === 'undefined') {
                setStatus('❌ SkeletonAnimationEditor 类未找到', 'error');
                return false;
            }

            try {
                // 创建简单的适配器
                const adapter = {
                    toolManager: {
                        tools: {},
                        register: function(name, tool) {
                            this.tools[name] = tool;
                        },
                        getTool: function(name) {
                            return this.tools[name];
                        }
                    },
                    renderer: {
                        render: () => {}
                    }
                };

                skeletonEditor = new SkeletonAnimationEditor(adapter);
                addTestResult('编辑器创建', true, '成功');

                setStatus('✅ 编辑器初始化成功', 'success');
                printTestResults();
                return true;
            } catch (e) {
                addTestResult('编辑器创建', false, e.message);
                setStatus(`❌ 编辑器初始化失败: ${e.message}`, 'error');
                printTestResults();
                return false;
            }
        }

        function testCreateBone() {
            setStatus('开始测试创建骨骼...', 'info');

            if (!skeletonEditor) {
                setStatus('❌ 编辑器未初始化', 'error');
                return false;
            }

            try {
                // 创建一些测试骨骼
                const rootBone = skeletonEditor.createBone('Root');
                addTestResult('创建根骨骼', true, `ID: ${rootBone.id}`);

                const armBone = skeletonEditor.createBone('Arm');
                addTestResult('创建子骨骼', true, `ID: ${armBone.id}`);

                // 设置父子关系
                skeletonEditor.skeleton.setParent(armBone.id, rootBone.id);
                addTestResult('设置父子关系', true, 'Arm -> Root');

                setStatus(`✅ 成功创建 ${skeletonEditor.skeleton.bones.size} 个骨骼`, 'success');
                printTestResults();
                return true;
            } catch (e) {
                addTestResult('创建骨骼', false, e.message);
                setStatus(`❌ 创建骨骼失败: ${e.message}`, 'error');
                printTestResults();
                return false;
            }
        }

        function testAnimation() {
            setStatus('开始测试动画...', 'info');

            if (!skeletonEditor) {
                setStatus('❌ 编辑器未初始化', 'error');
                return false;
            }

            try {
                // 创建关键帧
                const rootBone = skeletonEditor.skeleton.rootBones[0];
                if (rootBone) {
                    skeletonEditor.createKeyframe(rootBone.id, 0);
                    addTestResult('创建第0帧关键帧', true, '成功');

                    skeletonEditor.createKeyframe(rootBone.id, 24);
                    addTestResult('创建第24帧关键帧', true, '成功');

                    // 测试动画播放器
                    skeletonEditor.animationPlayer.play();
                    addTestResult('动画播放', true, '已开始');

                    setStatus('✅ 动画测试成功', 'success');
                } else {
                    addTestResult('动画测试', false, '没有可用的骨骼');
                    setStatus('⚠️ 没有可用的骨骼用于动画测试', 'info');
                }
                printTestResults();
                return true;
            } catch (e) {
                addTestResult('动画测试', false, e.message);
                setStatus(`❌ 动画测试失败: ${e.message}`, 'error');
                printTestResults();
                return false;
            }
        }

        function runAllTests() {
            setStatus('开始运行所有测试...', 'info');
            testResults = [];

            const results = [];

            // 运行测试1
            const test1Passed = testClasses();
            results.push({ name: '类加载测试', passed: test1Passed });

            // 等待一下
            setTimeout(() => {
                // 运行测试2
                const test2Passed = testInit();
                results.push({ name: '初始化测试', passed: test2Passed });

                setTimeout(() => {
                    // 运行测试3
                    const test3Passed = testCreateBone();
                    results.push({ name: '创建骨骼测试', passed: test3Passed });

                    setTimeout(() => {
                        // 运行测试4
                        const test4Passed = testAnimation();
                        results.push({ name: '动画测试', passed: test4Passed });

                        // 总结
                        const allPassed = results.every(r => r.passed);
                        const passedCount = results.filter(r => r.passed).length;
                        setStatus(`📊 测试完成: ${passedCount}/${results.length} 通过`, allPassed ? 'success' : 'error');

                        console.log('\n📊 测试总结:');
                        results.forEach(r => {
                            console.log(`  ${r.passed ? '✅' : '❌'} ${r.name}`);
                        });
                    }, 500);
                }, 500);
            }, 500);
        }
    </script>
</body>
</html>
