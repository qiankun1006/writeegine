# JUnit Platform Configuration
junit.jupiter.testinstance.lifecycle.default = per_class
junit.jupiter.execution.parallel.enabled = false
junit.jupiter.execution.parallel.mode.default = same_thread
junit.jupiter.conditions.deactivate = *
junit.jupiter.extensions.autodetection.enabled = true
junit.jupiter.testmethod.order.default = org.junit.jupiter.api.MethodOrderer$MethodName

# Display Names
junit.jupiter.displayname.generator.default = org.junit.jupiter.api.DisplayNameGenerator$ReplaceUnderscores

# Timeouts
junit.jupiter.execution.timeout.default = 10s
junit.jupiter.execution.timeout.testable.method.default = 10s
junit.jupiter.execution.timeout.testable.constructor.default = 10s
junit.jupiter.execution.timeout.testable.lifecycle.method.default = 10s

