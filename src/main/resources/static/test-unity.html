<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity 编辑器测试</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #testCanvas { width: 800px; height: 600px; border: 1px solid #ccc; }
        .test-result { padding: 10px; margin: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>Unity 编辑器功能测试</h1>

    <div id="testResults">
        <div class="test-result info">正在初始化测试...</div>
    </div>

    <div>
        <h3>Three.js 测试</h3>
        <canvas id="testCanvas"></canvas>
    </div>

    <div>
        <h3>功能测试</h3>
        <button onclick="testThreeJS()">测试 Three.js</button>
        <button onclick="testAmmoJS()">测试 Ammo.js</button>
        <button onclick="testUnityRenderer()">测试 UnityRenderer</button>
        <button onclick="testUnityEditor()">测试 UnityEditor</button>
    </div>

    <!-- 引入测试脚本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ammo.js@0.0.10/builds/ammo.wasm.js"></script>

    <!-- 引入 Unity 编辑器脚本 -->
    <script src="/static/js/unity-editor/UnityRenderer.js"></script>
    <script src="/static/js/unity-editor/UnityEditor.js"></script>
    <script src="/static/js/unity-editor/UnityPhysics.js"></script>
    <script src="/static/js/unity-editor/UnityUI.js"></script>

    <script>
        const testResults = document.getElementById('testResults');

        function addTestResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            testResults.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function testThreeJS() {
            try {
                addTestResult('开始测试 Three.js...', 'info');

                // 测试 Three.js 是否加载
                if (typeof THREE === 'undefined') {
                    addTestResult('❌ Three.js 未加载', 'error');
                    return;
                }

                addTestResult('✅ Three.js 已加载', 'success');

                // 创建简单的 Three.js 场景
                const canvas = document.getElementById('testCanvas');
                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setSize(canvas.width, canvas.height);

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, canvas.width / canvas.height, 0.1, 1000);
                camera.position.z = 5;

                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);

                // 渲染一帧
                renderer.render(scene, camera);

                addTestResult('✅ Three.js 场景创建和渲染成功', 'success');

            } catch (error) {
                addTestResult(`❌ Three.js 测试失败: ${error.message}`, 'error');
            }
        }

        function testAmmoJS() {
            try {
                addTestResult('开始测试 Ammo.js...', 'info');

                // 测试 Ammo.js 是否加载
                if (typeof Ammo === 'undefined') {
                    addTestResult('❌ Ammo.js 未加载', 'error');
                    return;
                }

                addTestResult('✅ Ammo.js 已加载', 'success');

                // 注意：Ammo.js 需要异步初始化
                Ammo().then(function(AmmoLib) {
                    addTestResult('✅ Ammo.js 初始化成功', 'success');

                    // 创建简单的物理世界
                    const collisionConfiguration = new AmmoLib.btDefaultCollisionConfiguration();
                    const dispatcher = new AmmoLib.btCollisionDispatcher(collisionConfiguration);
                    const overlappingPairCache = new AmmoLib.btDbvtBroadphase();
                    const solver = new AmmoLib.btSequentialImpulseConstraintSolver();
                    const dynamicsWorld = new AmmoLib.btDiscreteDynamicsWorld(
                        dispatcher, overlappingPairCache, solver, collisionConfiguration
                    );

                    dynamicsWorld.setGravity(new AmmoLib.btVector3(0, -9.8, 0));

                    addTestResult('✅ Ammo.js 物理世界创建成功', 'success');

                }).catch(function(error) {
                    addTestResult(`❌ Ammo.js 初始化失败: ${error.message}`, 'error');
                });

            } catch (error) {
                addTestResult(`❌ Ammo.js 测试失败: ${error.message}`, 'error');
            }
        }

        function testUnityRenderer() {
            try {
                addTestResult('开始测试 UnityRenderer...', 'info');

                if (typeof UnityRenderer === 'undefined') {
                    addTestResult('❌ UnityRenderer 未加载', 'error');
                    return;
                }

                addTestResult('✅ UnityRenderer 已加载', 'success');

                // 测试创建 UnityRenderer 实例
                const canvas = document.getElementById('testCanvas');
                const renderer = new UnityRenderer(canvas);

                addTestResult('✅ UnityRenderer 实例创建成功', 'success');

                // 测试基础功能
                const cube = renderer.createCube();
                addTestResult('✅ 立方体创建成功', 'success');

                const sphere = renderer.createSphere();
                addTestResult('✅ 球体创建成功', 'success');

                const plane = renderer.createPlane();
                addTestResult('✅ 平面创建成功', 'success');

                // 清理
                renderer.dispose();

                addTestResult('✅ UnityRenderer 所有测试通过', 'success');

            } catch (error) {
                addTestResult(`❌ UnityRenderer 测试失败: ${error.message}`, 'error');
            }
        }

        function testUnityEditor() {
            try {
                addTestResult('开始测试 UnityEditor...', 'info');

                if (typeof UnityEditor === 'undefined') {
                    addTestResult('❌ UnityEditor 未加载', 'error');
                    return;
                }

                addTestResult('✅ UnityEditor 已加载', 'success');

                // 测试创建 UnityEditor 实例
                const canvas = document.getElementById('testCanvas');
                const editor = new UnityEditor({
                    canvas: canvas,
                    container: document.body,
                    config: {
                        name: '测试编辑器',
                        version: '1.0.0'
                    }
                });

                addTestResult('✅ UnityEditor 实例创建成功', 'success');

                // 测试初始化
                editor.init();
                addTestResult('✅ UnityEditor 初始化成功', 'success');

                // 测试场景管理
                const sceneId = editor.createNewScene('测试场景');
                addTestResult(`✅ 场景创建成功 (ID: ${sceneId})`, 'success');

                // 测试对象创建
                const cubeId = editor.addObject('cube', '测试立方体');
                addTestResult(`✅ 立方体对象添加成功 (ID: ${cubeId})`, 'success');

                const sphereId = editor.addObject('sphere', '测试球体');
                addTestResult(`✅ 球体对象添加成功 (ID: ${sphereId})`, 'success');

                // 测试选择功能
                editor.selectObject(cubeId);
                addTestResult('✅ 对象选择功能正常', 'success');

                // 清理
                editor.dispose();

                addTestResult('✅ UnityEditor 所有测试通过', 'success');

            } catch (error) {
                addTestResult(`❌ UnityEditor 测试失败: ${error.message}`, 'error');
            }
        }

        // 页面加载完成后运行基础测试
        window.addEventListener('load', function() {
            addTestResult('页面加载完成，开始基础测试...', 'info');

            // 测试库加载
            setTimeout(() => {
                if (typeof THREE !== 'undefined') {
                    addTestResult('✅ Three.js 库已加载', 'success');
                } else {
                    addTestResult('❌ Three.js 库未加载', 'error');
                }

                if (typeof Ammo !== 'undefined') {
                    addTestResult('✅ Ammo.js 库已加载', 'success');
                } else {
                    addTestResult('❌ Ammo.js 库未加载', 'error');
                }

                if (typeof UnityRenderer !== 'undefined') {
                    addTestResult('✅ UnityRenderer 已加载', 'success');
                } else {
                    addTestResult('❌ UnityRenderer 未加载', 'error');
                }

                if (typeof UnityEditor !== 'undefined') {
                    addTestResult('✅ UnityEditor 已加载', 'success');
                } else {
                    addTestResult('❌ UnityEditor 未加载', 'error');
                }

                if (typeof UnityPhysics !== 'undefined') {
                    addTestResult('✅ UnityPhysics 已加载', 'success');
                } else {
                    addTestResult('❌ UnityPhysics 未加载', 'error');
                }

                if (typeof UnityUI !== 'undefined') {
                    addTestResult('✅ UnityUI 已加载', 'success');
                } else {
                    addTestResult('❌ UnityUI 未加载', 'error');
                }

            }, 1000);
        });
    </script>
</body>
</html>
