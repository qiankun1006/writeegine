<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity 物理引擎测试</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #1e1e1e; color: #ddd; }
        #physicsCanvas { width: 800px; height: 600px; border: 1px solid #444; background-color: #2d2d2d; }
        .test-container { display: flex; gap: 20px; margin-top: 20px; }
        .test-controls { width: 300px; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #2d5c2d; color: #7ec27e; border: 1px solid #2d7a2d; }
        .error { background-color: #5c2b29; color: #f48771; border: 1px solid #be1100; }
        .info { background-color: #2d5c5c; color: #7ec2c2; border: 1px solid #2d7a7a; }
        .warning { background-color: #5c5c2b; color: #f4f471; border: 1px solid #bebe00; }
        button { padding: 10px 15px; margin: 5px; background-color: #444; color: #ddd; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #555; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { margin-top: 20px; padding: 10px; background-color: #333; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Unity 物理引擎测试</h1>

    <div class="test-container">
        <div>
            <h3>物理模拟画布</h3>
            <canvas id="physicsCanvas"></canvas>
        </div>

        <div class="test-controls">
            <h3>测试控制</h3>
            <div id="testResults">
                <div class="test-result info">等待初始化...</div>
            </div>

            <div>
                <h4>物理引擎测试</h4>
                <button onclick="testPhysicsInitialization()" id="btnInitPhysics">初始化物理引擎</button>
                <button onclick="testCreateObjects()" id="btnCreateObjects" disabled>创建物理对象</button>
                <button onclick="testSimulation()" id="btnSimulation" disabled>开始模拟</button>
                <button onclick="testReset()" id="btnReset" disabled>重置场景</button>
            </div>

            <div>
                <h4>对象类型</h4>
                <button onclick="addBox()" disabled>添加盒子</button>
                <button onclick="addSphere()" disabled>添加球体</button>
                <button onclick="addPlane()" disabled>添加平面</button>
            </div>

            <div class="status">
                <h4>状态信息</h4>
                <div id="statusInfo">物理引擎: 未初始化</div>
                <div id="objectCount">对象数量: 0</div>
                <div id="simulationStatus">模拟状态: 停止</div>
                <div id="fpsCounter">FPS: --</div>
            </div>
        </div>
    </div>

    <!-- 引入 Three.js 和 Ammo.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ammo.js@0.0.10/builds/ammo.wasm.js"></script>

    <!-- 引入 Unity 物理引擎 -->
    <script src="/static/js/unity-editor/UnityPhysics.js"></script>

    <script>
        // 全局变量
        let physicsEngine = null;
        let renderer = null;
        let scene = null;
        let camera = null;
        let objects = new Map(); // objectId -> { physicsBody, mesh }
        let nextObjectId = 1;
        let isSimulating = false;
        let lastTime = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let currentFps = 0;

        const testResults = document.getElementById('testResults');
        const canvas = document.getElementById('physicsCanvas');

        // 添加测试结果
        function addTestResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            testResults.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);

            // 限制显示数量
            while (testResults.children.length > 10) {
                testResults.removeChild(testResults.firstChild);
            }

            // 滚动到底部
            testResults.scrollTop = testResults.scrollHeight;
        }

        // 更新状态显示
        function updateStatus() {
            document.getElementById('statusInfo').textContent =
                `物理引擎: ${physicsEngine && physicsEngine.isInitialized ? '已初始化' : '未初始化'}`;
            document.getElementById('objectCount').textContent =
                `对象数量: ${objects.size}`;
            document.getElementById('simulationStatus').textContent =
                `模拟状态: ${isSimulating ? '运行中' : '停止'}`;
            document.getElementById('fpsCounter').textContent =
                `FPS: ${currentFps}`;
        }

        // 初始化 Three.js 渲染器
        function initThreeJS() {
            try {
                addTestResult('初始化 Three.js 渲染器...', 'info');

                renderer = new THREE.WebGLRenderer({
                    canvas: canvas,
                    antialias: true,
                    alpha: true
                });
                renderer.setSize(canvas.width, canvas.height);
                renderer.setClearColor(0x2d2d2d, 1);

                scene = new THREE.Scene();

                camera = new THREE.PerspectiveCamera(75, canvas.width / canvas.height, 0.1, 1000);
                camera.position.set(0, 5, 15);
                camera.lookAt(0, 0, 0);

                // 添加基础光照
                const ambientLight = new THREE.AmbientLight(0x404040);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 20, 10);
                scene.add(directionalLight);

                addTestResult('✅ Three.js 渲染器初始化完成', 'success');
                return true;

            } catch (error) {
                addTestResult(`❌ Three.js 初始化失败: ${error.message}`, 'error');
                return false;
            }
        }

        // 测试物理引擎初始化
        async function testPhysicsInitialization() {
            try {
                addTestResult('开始初始化物理引擎...', 'info');

                // 检查 Ammo.js
                if (typeof Ammo === 'undefined') {
                    addTestResult('❌ Ammo.js 未加载', 'error');
                    return;
                }

                addTestResult('✅ Ammo.js 已加载', 'success');

                // 初始化 Three.js
                if (!initThreeJS()) {
                    return;
                }

                // 创建物理引擎实例
                physicsEngine = new UnityPhysics();
                addTestResult('✅ UnityPhysics 实例创建成功', 'success');

                // 初始化物理引擎
                const initialized = await physicsEngine.initialize();
                if (!initialized) {
                    addTestResult('❌ 物理引擎初始化失败', 'error');
                    return;
                }

                addTestResult('✅ 物理引擎初始化成功', 'success');

                // 启用控制按钮
                document.getElementById('btnCreateObjects').disabled = false;
                document.getElementById('btnReset').disabled = false;

                // 更新状态
                updateStatus();

                // 开始渲染循环
                requestAnimationFrame(render);

            } catch (error) {
                addTestResult(`❌ 物理引擎测试失败: ${error.message}`, 'error');
            }
        }

        // 创建测试对象
        function testCreateObjects() {
            try {
                addTestResult('创建测试物理对象...', 'info');

                // 创建地面
                const groundId = `ground-${nextObjectId++}`;
                const groundMesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(20, 20),
                    new THREE.MeshPhongMaterial({ color: 0x808080, side: THREE.DoubleSide })
                );
                groundMesh.rotation.x = -Math.PI / 2;
                scene.add(groundMesh);

                // 添加物理地面
                physicsEngine.addPlane(groundId, { position: { x: 0, y: 0, z: 0 } });
                objects.set(groundId, { physicsBody: physicsEngine.objects.get(groundId), mesh: groundMesh });

                addTestResult('✅ 地面创建成功', 'success');

                // 创建几个测试物体
                for (let i = 0; i < 3; i++) {
                    const boxId = `box-${nextObjectId++}`;
                    const boxMesh = new THREE.Mesh(
                        new THREE.BoxGeometry(1, 1, 1),
                        new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff })
                    );
                    boxMesh.position.set((i - 1) * 3, 5 + i * 2, 0);
                    scene.add(boxMesh);

                    physicsEngine.addBox(boxId, {
                        position: { x: boxMesh.position.x, y: boxMesh.position.y, z: boxMesh.position.z },
                        size: { x: 1, y: 1, z: 1 },
                        mass: 1
                    });

                    objects.set(boxId, { physicsBody: physicsEngine.objects.get(boxId), mesh: boxMesh });
                }

                addTestResult('✅ 测试盒子创建成功', 'success');

                // 启用模拟按钮
                document.getElementById('btnSimulation').disabled = false;

                // 更新状态
                updateStatus();

            } catch (error) {
                addTestResult(`❌ 创建对象失败: ${error.message}`, 'error');
            }
        }

        // 开始/停止物理模拟
        function testSimulation() {
            if (!isSimulating) {
                // 开始模拟
                isSimulating = true;
                physicsEngine.startSimulation();
                document.getElementById('btnSimulation').textContent = '停止模拟';
                addTestResult('物理模拟已开始', 'info');
            } else {
                // 停止模拟
                isSimulating = false;
                physicsEngine.stopSimulation();
                document.getElementById('btnSimulation').textContent = '开始模拟';
                addTestResult('物理模拟已停止', 'info');
            }

            updateStatus();
        }

        // 重置场景
        function testReset() {
            try {
                addTestResult('重置物理场景...', 'info');

                // 停止模拟
                isSimulating = false;
                if (physicsEngine) {
                    physicsEngine.stopSimulation();
                }

                // 移除所有 Three.js 对象
                objects.forEach(obj => {
                    if (obj.mesh && obj.mesh.parent) {
                        scene.remove(obj.mesh);
                    }
                });
                objects.clear();

                // 重置物理引擎
                if (physicsEngine) {
                    physicsEngine.reset();
                }

                // 重置按钮状态
                document.getElementById('btnSimulation').textContent = '开始模拟';
                document.getElementById('btnSimulation').disabled = true;

                addTestResult('✅ 场景重置完成', 'success');
                updateStatus();

            } catch (error) {
                addTestResult(`❌ 重置失败: ${error.message}`, 'error');
            }
        }

        // 渲染循环
        function render(currentTime) {
            frameCount++;

            // 计算 FPS
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = Math.round(frameCount * 1000 / (currentTime - lastFpsUpdate));
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStatus();
            }

            // 更新物理模拟
            if (isSimulating && physicsEngine && physicsEngine.isInitialized) {
                const deltaTime = lastTime ? (currentTime - lastTime) / 1000 : 0;
                lastTime = currentTime;

                if (deltaTime > 0) {
                    physicsEngine.update(deltaTime);

                    // 同步物理对象位置到 Three.js 网格
                    objects.forEach((obj, objectId) => {
                        if (obj.physicsBody && obj.mesh) {
                            const transform = physicsEngine.getObjectTransform(objectId);
                            if (transform) {
                                obj.mesh.position.set(transform.position.x, transform.position.y, transform.position.z);
                                obj.mesh.quaternion.set(
                                    transform.rotation.x,
                                    transform.rotation.y,
                                    transform.rotation.z,
                                    transform.rotation.w
                                );
                            }
                        }
                    });
                }
            }

            // 渲染场景
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }

            // 继续渲染循环
            requestAnimationFrame(render);
        }

        // 页面加载完成后的初始化
        window.addEventListener('load', function() {
            addTestResult('页面加载完成', 'info');
            addTestResult('请点击"初始化物理引擎"按钮开始测试', 'info');

            // 检查库加载状态
            setTimeout(() => {
                if (typeof THREE !== 'undefined') {
                    addTestResult('✅ Three.js 已加载', 'success');
                } else {
                    addTestResult('❌ Three.js 未加载', 'error');
                }

                if (typeof Ammo !== 'undefined') {
                    addTestResult('✅ Ammo.js 已加载', 'success');
                } else {
                    addTestResult('❌ Ammo.js 未加载', 'error');
                }

                if (typeof UnityPhysics !== 'undefined') {
                    addTestResult('✅ UnityPhysics 已加载', 'success');
                } else {
                    addTestResult('❌ UnityPhysics 未加载', 'error');
                }
            }, 500);
        });
    </script>
</body>
</html>
