<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子效果编辑器 - WriteEngine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }

        .editor-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .editor-header {
            background: #2a2a2a;
            padding: 10px 20px;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .back-link {
            color: #409eff;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .editor-content {
            flex: 1;
            overflow: hidden;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 16px;
            color: #999;
        }

        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid #409eff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="editor-header">
            <h1>✨ 粒子效果编辑器</h1>
            <a href="/create-game/asset" class="back-link">← 返回素材创作</a>
        </div>
        <div class="editor-content">
            <div class="loading">
                正在加载粒子编辑器...
            </div>
        </div>
    </div>

    <script>
        // 动态加载粒子编辑器
        window.addEventListener('DOMContentLoaded', () => {
            const script = document.createElement('script');
            script.type = 'module';
            script.src = '/particle-effect-editor/assets/index.js';
            document.body.appendChild(script);

            // 添加样式
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = '/particle-effect-editor/assets/style.css';
            document.head.appendChild(link);
        });
    </script>
</body>
</html>
