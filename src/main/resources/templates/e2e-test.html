<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>端到端测试 - 游戏编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      color: #333;
      font-size: 36px;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 16px;
    }

    .test-section {
      margin-bottom: 40px;
    }

    .test-section h2 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 24px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
    }

    .btn-warning {
      background: #f59e0b;
      color: white;
    }

    .btn-warning:hover {
      background: #d97706;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
    }

    .status-bar {
      background: #f3f4f6;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .status-bar.active {
      display: block;
    }

    .status-bar h3 {
      color: #333;
      margin-bottom: 15px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      font-weight: 600;
      color: #666;
    }

    .status-value {
      color: #333;
    }

    .test-log {
      background: #1f2937;
      color: #f3f4f6;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 20px;
      display: none;
    }

    .test-log.active {
      display: block;
    }

    .test-log .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid #374151;
    }

    .test-log .log-entry.pass {
      color: #10b981;
    }

    .test-log .log-entry.fail {
      color: #ef4444;
    }

    .test-log .log-entry.skip {
      color: #f59e0b;
    }

    .test-log .log-entry.info {
      color: #60a5fa;
    }

    .result-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
    }

    .result-card h3 {
      color: #333;
      margin-bottom: 15px;
    }

    .result-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .metric {
      background: #f9fafb;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
    }

    .metric-value {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
    }

    .metric-label {
      color: #666;
      font-size: 14px;
      margin-top: 5px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s ease;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f4f6;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .test-results {
      margin-top: 20px;
      display: none;
    }

    .test-results.active {
      display: block;
    }

    .result-item {
      padding: 10px;
      margin: 5px 0;
      border-radius: 4px;
      font-size: 14px;
    }

    .result-item.pass {
      background: #d1fae5;
      color: #065f46;
    }

    .result-item.fail {
      background: #fee2e2;
      color: #991b1b;
    }

    .result-item.skip {
      background: #fef3c7;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧪 端到端测试</h1>
      <p>游戏编辑器集成测试套件</p>
    </div>

    <div class="test-section">
      <h2>测试操作</h2>
      <div class="button-group">
        <button class="btn btn-primary" onclick="runAllTests()">
          🚀 运行所有测试
        </button>
        <button class="btn btn-success" onclick="runQuickTests()">
          ⚡ 快速测试
        </button>
        <button class="btn btn-warning" onclick="exportReport()">
          📄 导出报告
        </button>
        <button class="btn btn-danger" onclick="clearResults()">
          🗑️ 清除结果
        </button>
      </div>

      <div class="status-bar" id="statusBar">
        <h3>测试状态</h3>
        <div class="status-item">
          <span class="status-label">状态:</span>
          <span class="status-value" id="testStatus">就绪</span>
        </div>
        <div class="status-item">
          <span class="status-label">已运行:</span>
          <span class="status-value" id="testRunCount">0</span>
        </div>
        <div class="status-item">
          <span class="status-label">通过:</span>
          <span class="status-value" id="testPassCount">0</span>
        </div>
        <div class="status-item">
          <span class="status-label">失败:</span>
          <span class="status-value" id="testFailCount">0</span>
        </div>
        <div class="status-item">
          <span class="status-label">跳过:</span>
          <span class="status-value" id="testSkipCount">0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <div class="test-section">
      <h2>测试日志</h2>
      <div class="test-log" id="testLog">
        <div class="log-entry info">等待运行测试...</div>
      </div>
    </div>

    <div class="test-section">
      <h2>测试结果</h2>
      <div class="result-card" id="resultCard" style="display: none;">
        <h3>测试摘要</h3>
        <div class="result-metrics">
          <div class="metric">
            <div class="metric-value" id="totalTests">0</div>
            <div class="metric-label">总测试数</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="passedTests">0</div>
            <div class="metric-label">通过</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="failedTests">0</div>
            <div class="metric-label">失败</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="skippedTests">0</div>
            <div class="metric-label">跳过</div>
          </div>
          <div class="metric">
            <div class="metric-value" id="successRate">0%</div>
            <div class="metric-label">成功率</div>
          </div>
        </div>

        <h3>详细结果</h3>
        <div class="test-results" id="testResults"></div>
      </div>
    </div>
  </div>

  <!-- 引入测试脚本 -->
  <script src="/js/unity-editor/EndToEndTest.js"></script>

  <script>
    let endToEndTest = null;
    let testReport = null;

    // 拦截 console.log 来显示在页面上
    const originalLog = console.log;
    const originalError = console.error;
    const originalGroup = console.group;
    const originalGroupEnd = console.groupEnd;

    console.log = function(...args) {
      originalLog.apply(console, args);
      appendLog('info', args.join(' '));
    };

    console.error = function(...args) {
      originalError.apply(console, args);
      appendLog('fail', args.join(' '));
    };

    console.group = function(...args) {
      originalGroup.apply(console, args);
      appendLog('info', `📂 ${args.join(' ')}`);
    };

    console.groupEnd = function(...args) {
      originalGroupEnd.apply(console, args);
      appendLog('info', '📁 组结束');
    };

    function appendLog(type, message) {
      const testLog = document.getElementById('testLog');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;

      if (message.includes('✅')) {
        entry.className = 'log-entry pass';
      } else if (message.includes('❌')) {
        entry.className = 'log-entry fail';
      } else if (message.includes('⏭️')) {
        entry.className = 'log-entry skip';
      }

      entry.textContent = message;
      testLog.appendChild(entry);
      testLog.scrollTop = testLog.scrollHeight;
    }

    async function runAllTests() {
      if (!window.EndToEndTest) {
        appendLog('fail', '❌ EndToEndTest 未加载');
        return;
      }

      updateStatus('running', '测试运行中...');
      clearResults();
      document.getElementById('resultCard').style.display = 'none';

      endToEndTest = new EndToEndTest();
      testReport = await endToEndTest.runAllTests();

      displayResults(testReport);
      updateStatus('completed', '测试完成');
    }

    async function runQuickTests() {
      if (!window.EndToEndTest) {
        appendLog('fail', '❌ EndToEndTest 未加载');
        return;
      }

      updateStatus('running', '快速测试运行中...');
      clearResults();
      document.getElementById('resultCard').style.display = 'none';

      endToEndTest = new EndToEndTest();

      // 只运行关键测试
      appendLog('info', '🚀 运行快速测试（仅数据兼容性和创建流程）');
      await endToEndTest.testDataCompatibility();
      await endToEndTest.testCreateGameFlow();

      testReport = endToEndTest.getReport();
      displayResults(testReport);
      updateStatus('completed', '快速测试完成');
    }

    function displayResults(report) {
      document.getElementById('resultCard').style.display = 'block';

      const summary = report.summary;
      document.getElementById('totalTests').textContent = summary.total;
      document.getElementById('passedTests').textContent = summary.passed;
      document.getElementById('failedTests').textContent = summary.failed;
      document.getElementById('skippedTests').textContent = summary.skipped;
      document.getElementById('successRate').textContent = `${summary.successRate}%`;

      // 更新状态栏
      document.getElementById('testRunCount').textContent = summary.total;
      document.getElementById('testPassCount').textContent = summary.passed;
      document.getElementById('testFailCount').textContent = summary.failed;
      document.getElementById('testSkipCount').textContent = summary.skipped;
      document.getElementById('progressFill').style.width = `${summary.successRate}%`;

      // 显示详细结果
      const resultsContainer = document.getElementById('testResults');
      resultsContainer.innerHTML = '';
      resultsContainer.classList.add('active');

      if (report.results && report.results.length > 0) {
        report.results.forEach(result => {
          const item = document.createElement('div');
          item.className = `result-item ${result.status.toLowerCase()}`;
          item.textContent = `${result.status}: ${result.message}`;
          resultsContainer.appendChild(item);
        });
      }
    }

    function updateStatus(status, message) {
      const statusValue = document.getElementById('testStatus');
      const statusBar = document.getElementById('statusBar');

      if (status === 'running') {
        statusValue.textContent = message + ' <span class="loading"></span>';
      } else if (status === 'completed') {
        statusValue.textContent = message;
      } else {
        statusValue.textContent = message;
      }

      statusBar.classList.add('active');
    }

    function exportReport() {
      if (!testReport) {
        alert('请先运行测试');
        return;
      }

      const reportText = JSON.stringify(testReport, null, 2);
      const blob = new Blob([reportText], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `test-report-${new Date().getTime()}.json`;
      a.click();
      URL.revokeObjectURL(url);

      appendLog('info', '📄 报告已导出');
    }

    function clearResults() {
      document.getElementById('testLog').innerHTML = '<div class="log-entry info">等待运行测试...</div>';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('testResults').classList.remove('active');
    }

    // 页面加载时检查
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (window.EndToEndTest) {
          appendLog('info', '✅ 端到端测试框架已加载');
        } else {
          appendLog('fail', '❌ 端到端测试框架加载失败');
        }
      }, 500);
    });
  </script>
</body>
</html>
