<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="~{layout}">
<head>
    <title th:text="${title}">编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .editor-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f5f5f5;
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .editor-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .back-button, .save-button {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .back-button:hover, .save-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .save-button {
            background: rgba(76, 175, 80, 0.3);
        }

        .save-button:hover {
            background: rgba(76, 175, 80, 0.5);
        }

        /* 主容器 */
        .editor-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 中间工作区 */
        .editor-workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 40px;
            overflow-y: auto;
        }

        /* 占位符容器 */
        .placeholder-container {
            text-align: center;
            padding: 60px 40px;
        }

        .placeholder-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .placeholder-title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .placeholder-desc {
            font-size: 16px;
            color: #999;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .development-info {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 16px;
            border-radius: 4px;
            text-align: left;
            margin-bottom: 30px;
            display: inline-block;
            max-width: 400px;
        }

        .development-info h4 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .development-info ul {
            list-style: none;
            font-size: 13px;
            color: #666;
        }

        .development-info li {
            margin-bottom: 6px;
        }

        .development-info li:before {
            content: "▸ ";
            color: #667eea;
            font-weight: bold;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }

        .action-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .action-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="editor-wrapper">
            <!-- 头部 -->
            <div class="editor-header">
                <h1 th:text="${title}">编辑器</h1>
                <div class="header-buttons">
                    <button class="save-button" onclick="saveAsset()">💾 保存</button>
                    <a href="/create-game/asset" class="back-button">← 返回</a>
                </div>
            </div>

            <!-- 主编辑区域 -->
            <div class="editor-container">
                <!-- 工作区 -->
                <div class="editor-workspace">
                    <div class="placeholder-container">
                        <div class="placeholder-icon">🚧</div>
                        <div class="placeholder-title">编辑器开发中</div>
                        <div class="placeholder-desc">
                            该编辑器功能正在开发中，敬请期待！
                        </div>

                        <div class="development-info">
                            <h4>📋 预计功能包括:</h4>
                            <ul>
                                <li>直观的编辑界面</li>
                                <li>丰富的编辑工具</li>
                                <li>实时预览效果</li>
                                <li>导入/导出功能</li>
                                <li>版本管理</li>
                            </ul>
                        </div>

                        <div class="action-buttons">
                            <a href="/create-game/asset" class="action-btn">← 返回素材中心</a>
                            <a href="/create-game" class="action-btn">🏠 返回首页</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function saveAsset() {
            alert('编辑器开发中，敬请期待！');
        }
    </script>
</body>
</html>
