<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="~{layout}">
<head>
    <title>AI 人物立绘生成器</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 确保应用占满整个页面 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .portrait-app-root {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        .loading-message {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 18px;
            color: #666;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6C5CE7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <!-- Vue 应用根节点 -->
        <div id="app" class="portrait-app-root">
            <div class="loading-message">
                <div class="loading-spinner"></div>
                <span>AI 立绘生成器加载中...</span>
            </div>
        </div>

        <!-- Vue 应用脚本 -->
        <script type="module">
            // 检查 dist 目录是否存在
            async function loadApp() {
                try {
                    // 尝试加载编译后的应用
                    const { default: createApp } = await import('/static/ai-portrait-generator/dist/assets/main.js');
                    console.log('✓ Vue 应用加载成功');
                } catch (err) {
                    console.error('✗ Vue 应用加载失败:', err);

                    // 显示更详细的错误信息
                    const app = document.getElementById('app');
                    app.innerHTML = `
                        <div style="padding: 40px; max-width: 600px; margin: 100px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                            <h2 style="color: #d32f2f; margin-top: 0;">⚠️ 应用加载失败</h2>
                            <p style="color: #666; line-height: 1.6;">
                                Vue 应用尚未构建。请按照以下步骤进行：
                            </p>
                            <ol style="color: #666;">
                                <li>在项目目录运行：<code style="background: #f5f5f5; padding: 2px 4px;">npm install</code></li>
                                <li>然后运行：<code style="background: #f5f5f5; padding: 2px 4px;">npm run build</code></li>
                                <li>重启 Spring Boot 应用</li>
                                <li>刷新此页面</li>
                            </ol>
                            <p style="color: #999; font-size: 12px; margin-bottom: 0;">
                                路径：src/main/resources/static/ai-portrait-generator/<br/>
                                错误详情：${err.message}
                            </p>
                        </div>
                    `;
                }
            }

            // 页面加载完成后尝试加载应用
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadApp);
            } else {
                loadApp();
            }
        </script>
    </div>
</body>
</html>
