<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="~{layout}">
<head>
    <title>角色立绘编辑</title>
    <link rel="stylesheet" th:href="@{/static/css/asset-editor.css}">
    <style>
        .editor-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f5f5f5;
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .editor-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .back-button, .save-button {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .back-button:hover, .save-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .save-button {
            background: rgba(76, 175, 80, 0.3);
        }

        .save-button:hover {
            background: rgba(76, 175, 80, 0.5);
        }

        /* 主容器 */
        .editor-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左侧工具栏 */
        .editor-toolbar {
            width: 250px;
            background: white;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.05);
        }

        .toolbar-section {
            margin-bottom: 25px;
        }

        .toolbar-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            cursor: default;
        }

        .toolbar-control {
            margin-bottom: 15px;
        }

        .toolbar-control label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }

        .toolbar-control input,
        .toolbar-control select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        /* 中间画布区域 */
        .editor-canvas {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .canvas-wrapper {
            position: relative;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* 右侧属性面板 */
        .editor-properties {
            width: 300px;
            background: white;
            border-left: 1px solid #e0e0e0;
            overflow-y: auto;
            padding: 20px;
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.05);
        }

        .properties-section {
            margin-bottom: 20px;
        }

        .properties-section h4 {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* 快速按钮组 */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }

        .quick-action-btn {
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .quick-action-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .quick-action-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="editor-wrapper">
            <!-- 头部 -->
            <div class="editor-header">
                <h1>🎭 角色立绘编辑</h1>
                <div class="header-buttons">
                    <button class="save-button" onclick="saveAsset()">💾 保存</button>
                    <a href="/create-game/asset" class="back-button">← 返回</a>
                </div>
            </div>

            <!-- 主编辑区域 -->
            <div class="editor-container">
                <!-- 左侧工具栏 -->
                <div class="editor-toolbar">
                    <div class="toolbar-section">
                        <h3>基本设置</h3>
                        <div class="toolbar-control">
                            <label>立绘类型</label>
                            <select id="portrait-type" onchange="updatePreview()">
                                <option value="full">全身</option>
                                <option value="half">半身</option>
                                <option value="head">头像</option>
                            </select>
                        </div>
                        <div class="toolbar-control">
                            <label>背景颜色</label>
                            <input type="color" id="portrait-bg-color" value="#ffffff" onchange="updatePreview()">
                        </div>
                    </div>

                    <div class="toolbar-section">
                        <h3>尺寸设置</h3>
                        <div class="toolbar-control">
                            <label>宽度 (px)</label>
                            <input type="number" id="canvas-width" value="400" min="200" max="1000" onchange="resizeCanvas()">
                        </div>
                        <div class="toolbar-control">
                            <label>高度 (px)</label>
                            <input type="number" id="canvas-height" value="600" min="200" max="1000" onchange="resizeCanvas()">
                        </div>
                    </div>

                    <div class="toolbar-section">
                        <h3>笔刷工具</h3>
                        <div class="toolbar-control">
                            <label>笔刷大小</label>
                            <input type="range" id="brush-size" min="1" max="50" value="5">
                        </div>
                        <div class="toolbar-control">
                            <label>笔刷颜色</label>
                            <input type="color" id="brush-color" value="#333333">
                        </div>
                    </div>
                </div>

                <!-- 中间画布区域 -->
                <div class="editor-canvas">
                    <div class="canvas-wrapper">
                        <canvas id="portrait-canvas" width="400" height="600"></canvas>
                    </div>
                </div>

                <!-- 右侧属性面板 -->
                <div class="editor-properties">
                    <div class="properties-section">
                        <h4>📊 当前资源信息</h4>
                        <p style="font-size: 12px; color: #999;">
                            <strong>类型:</strong> 角色立绘<br>
                            <strong>模式:</strong> <span id="current-type">全身</span><br>
                            <strong>尺寸:</strong> <span id="current-size">400x600</span>px<br>
                            <strong>状态:</strong> 未保存
                        </p>
                    </div>

                    <div class="properties-section">
                        <h4>🎨 常用操作</h4>
                        <div class="quick-actions">
                            <button class="quick-action-btn" onclick="clearCanvas()">🗑️ 清空画布</button>
                            <button class="quick-action-btn" onclick="undoAction()">↶ 撤销</button>
                            <button class="quick-action-btn" onclick="redoAction()">↷ 重做</button>
                            <button class="quick-action-btn" onclick="exportImage()">📥 导出</button>
                        </div>
                    </div>

                    <div class="properties-section">
                        <h4>💡 快速提示</h4>
                        <p style="font-size: 12px; color: #999; line-height: 1.6;">
                            • 在画布上拖动鼠标进行绘图<br>
                            • 调整笔刷大小和颜色<br>
                            • 支持全身/半身/头像三种模式<br>
                            • 完成后点击保存按钮
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化画布
        const canvas = document.getElementById('portrait-canvas');
        const ctx = canvas.getContext('2d');

        function initCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();
        }

        function drawGrid() {
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            const spacing = 40;

            for (let x = 0; x <= canvas.width; x += spacing) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y <= canvas.height; y += spacing) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function updatePreview() {
            const type = document.getElementById('portrait-type').value;
            const bgColor = document.getElementById('portrait-bg-color').value;

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            // 更新显示信息
            document.getElementById('current-type').textContent =
                type === 'full' ? '全身' : type === 'half' ? '半身' : '头像';
        }

        function resizeCanvas() {
            const width = parseInt(document.getElementById('canvas-width').value);
            const height = parseInt(document.getElementById('canvas-height').value);

            canvas.width = width;
            canvas.height = height;
            document.getElementById('current-size').textContent = width + 'x' + height;
            initCanvas();
        }

        function clearCanvas() {
            if (confirm('确定要清空画布吗？')) {
                updatePreview();
            }
        }

        function undoAction() {
            console.log('撤销操作');
        }

        function redoAction() {
            console.log('重做操作');
        }

        function saveAsset() {
            alert('资源已保存！');
        }

        function exportImage() {
            const image = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = image;
            link.download = 'character-portrait.png';
            link.click();
        }

        // 初始化
        initCanvas();
    </script>
</body>
</html>
