<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>无实际使用，Controller设置了Model属性，作为浏览器标签</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <!-- Vue 应用根节点 -->
    <div id="app"></div>

    <!-- 加载 Vue 应用 -->
    <script type="module">
        // 检测是否处于开发模式
        const isDevelopment = new URLSearchParams(window.location.search).get('dev') === 'true' ||
                             location.hostname === 'localhost' ||
                             location.hostname === '127.0.0.1';

        // 根据环境选择资源源
        let sourceUrl = isDevelopment
            ? 'http://localhost:5173/'
            : '/static/ai-portrait-generator/dist/index.html';

        async function loadApp() {
            try {
                const response = await fetch(sourceUrl);
                if (!response.ok) {
                    if (isDevelopment) {
                        console.warn('Vite Dev Server 未运行，回退到生产构建');
                        // 递归调用，加载生产构建
                        sourceUrl = '/static/ai-portrait-generator/dist/index.html';
                        return loadApp();
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const html = await response.text();

                // 提取 CSS 文件
                const cssRegex = /<link[^>]*href="([^"]*\.css)"[^>]*>/g;
                const cssFiles = [];
                let match;
                while ((match = cssRegex.exec(html)) !== null) {
                    cssFiles.push(match[1]);
                }

                // 提取 JS 脚本
                const scriptRegex = /<script[^>]*src="([^"]*\.js)"[^>]*>/g;
                const jsFiles = [];
                while ((match = scriptRegex.exec(html)) !== null) {
                    jsFiles.push(match[1]);
                }

                // 加载 CSS 文件
                for (const cssPath of cssFiles) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = cssPath;
                    document.head.appendChild(link);
                }

                // 加载 JS 脚本
                for (const jsPath of jsFiles) {
                    const script = document.createElement('script');
                    script.type = 'module';
                    script.src = jsPath;
                    document.body.appendChild(script);
                }

            } catch (err) {
                console.error('应用加载失败:', err);
                document.getElementById('app').innerHTML = `
                    <div style="padding: 40px; text-align: center; margin-top: 50px;">
                        <h2>⚠️ 应用加载失败</h2>
                        <p>${err.message}</p>
                    </div>
                `;
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadApp);
        } else {
            loadApp();
        }
    </script>
</body>
</html>
