<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>AI 人物立绘生成器</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 确保应用占满整个页面 */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        .portrait-app-root {
            width: 100%;
            height: 100vh;
        }

        .loading-message {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 18px;
            color: #666;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6C5CE7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <!-- Vue 应用根节点 -->
        <div id="app" class="portrait-app-root">
            <div class="loading-message">
                <div class="loading-spinner"></div>
                <span>AI 立绘生成器加载中...</span>
            </div>
        </div>

        <!-- Vue 应用脚本 -->
        <script type="module">
            // 动态查找并加载最新的构建文件
            async function loadApp() {
                try {
                    // 获取 dist 目录中的 index.html 来获取正确的文件名
                    const response = await fetch('/static/ai-portrait-generator/dist/index.html');
                    const html = await response.text();

                    // 提取 CSS 链接
                    const cssMatch = html.match(/<link[^>]*href="([^"]*\.css)"[^>]*>/);
                    if (cssMatch && cssMatch[1]) {
                        const cssPath = cssMatch[1];
                        console.log('✓ 加载样式文件:', cssPath);

                        // 加载 CSS
                        const link = document.createElement('link');
                        link.rel = 'stylesheet';
                        link.href = cssPath;
                        link.onload = () => {
                            console.log('✓ 样式文件加载成功');
                            loadScript(html);
                        };
                        link.onerror = (err) => {
                            console.error('✗ 样式文件加载失败:', err);
                            loadScript(html); // 即使 CSS 失败也继续加载脚本
                        };
                        document.head.appendChild(link);
                    } else {
                        loadScript(html);
                    }
                } catch (err) {
                    console.error('✗ 应用加载失败:', err);
                    showError('获取配置文件失败: ' + err.message);
                }
            }

            function loadScript(html) {
                // 提取 script 标签中的 src
                const scriptMatch = html.match(/<script[^>]*src="([^"]*)"[^>]*><\/script>/);
                if (scriptMatch && scriptMatch[1]) {
                    const scriptPath = scriptMatch[1];
                    console.log('✓ 加载应用脚本:', scriptPath);

                    // 创建并追加脚本元素
                    const script = document.createElement('script');
                    script.type = 'module';
                    script.src = scriptPath;
                    script.onload = () => console.log('✓ Vue 应用加载成功');
                    script.onerror = (err) => {
                        console.error('✗ 应用脚本加载失败:', err);
                        showError('脚本加载失败: ' + scriptPath);
                    };
                    document.body.appendChild(script);
                } else {
                    showError('无法从 index.html 中提取脚本路径');
                }
            }

            function showError(message) {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div style="padding: 40px; max-width: 600px; margin: 100px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <h2 style="color: #d32f2f; margin-top: 0;">⚠️ 应用加载失败</h2>
                        <p style="color: #666; line-height: 1.6;">
                            ${message}
                        </p>
                        <p style="color: #666; line-height: 1.6;">
                            请确保已执行以下步骤：
                        </p>
                        <ol style="color: #666;">
                            <li>进入目录：src/main/resources/static/ai-portrait-generator/</li>
                            <li>运行：npm install</li>
                            <li>运行：npm run build</li>
                            <li>重启 Spring Boot 应用</li>
                            <li>刷新此页面</li>
                        </ol>
                    </div>
                `;
            }

            // 页面加载完成后尝试加载应用
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadApp);
            } else {
                loadApp();
            }
        </script>
    </div>
</body>
</html>
