<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>无实际使用，Controller设置了Model属性，作为浏览器标签</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <!-- Vue 应用根节点 -->
    <div id="app"></div>

    <!-- 加载 Vue 应用 -->
    <script type="module">
        // 强制使用生产模式（禁用开发模式）
        const isDevelopment = false;

        // 使用生产构建
        let sourceUrl = '/static/ai-portrait-generator/dist/index.html';

        async function loadApp() {
            try {
                console.log('📥 开始加载应用，URL:', sourceUrl);
                const response = await fetch(sourceUrl);
                console.log('📊 响应状态:', response.status, response.statusText);

                if (!response.ok) {
                    if (isDevelopment) {
                        console.warn('Vite Dev Server 未运行，回退到生产构建');
                        // 递归调用，加载生产构建
                        sourceUrl = '/static/ai-portrait-generator/dist/index.html';
                        return loadApp();
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const html = await response.text();
                console.log('✓ HTML内容已获取，长度:', html.length);

                // 提取 CSS 文件
                const cssRegex = /<link[^>]*href="([^"]*\.css)"[^>]*>/g;
                const cssFiles = [];
                let match;
                while ((match = cssRegex.exec(html)) !== null) {
                    cssFiles.push(match[1]);
                }
                console.log('🎨 找到CSS文件:', cssFiles);

                // 提取 JS 脚本
                const scriptRegex = /<script[^>]*src="([^"]*\.js)"[^>]*>/g;
                const jsFiles = [];
                while ((match = scriptRegex.exec(html)) !== null) {
                    jsFiles.push(match[1]);
                }
                console.log('📦 找到JS文件:', jsFiles);

                // 加载 CSS 文件
                for (const cssPath of cssFiles) {
                    console.log('⏳ 加载CSS:', cssPath);
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = cssPath;
                    document.head.appendChild(link);
                }

                // 加载 JS 脚本
                for (const jsPath of jsFiles) {
                    console.log('⏳ 加载JS:', jsPath);
                    const script = document.createElement('script');
                    script.type = 'module';
                    script.src = jsPath;
                    script.onerror = (err) => {
                        console.error('❌ JS加载错误:', jsPath, err);
                    };
                    document.body.appendChild(script);
                }

                console.log('✅ 应用加载完成');

            } catch (err) {
                console.error('❌ 应用加载失败:', err);
                console.error('🔍 尝试的URL:', sourceUrl);
                console.error('📋 开发模式:', isDevelopment);
                document.getElementById('app').innerHTML = `
                    <div style="padding: 40px; max-width: 600px; margin: 50px auto; background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px;">
                        <h2 style="color: #d32f2f; margin-top: 0;">⚠️ 应用加载失败</h2>
                        <p><strong>错误信息:</strong> ${err.message}</p>
                        <p><strong>尝试加载的URL:</strong> <code>${sourceUrl}</code></p>
                        <p><strong>开发模式:</strong> ${isDevelopment}</p>
                        <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;">
                        <p style="font-size: 14px; color: #666;">
                            <strong>解决方案:</strong>
                        </p>
                        <ul style="font-size: 14px; color: #666;">
                            <li>如果是开发模式，请确保 Vite 服务器正在运行:
                                <pre style="background: #f5f5f5; padding: 10px; border-radius: 4px;">cd src/main/resources/static/ai-portrait-generator
npm run dev</pre>
                            </li>
                            <li>如果是生产模式，请确保已构建:
                                <pre style="background: #f5f5f5; padding: 10px; border-radius: 4px;">cd src/main/resources/static/ai-portrait-generator
npm run build</pre>
                            </li>
                            <li>打开浏览器F12查看Network标签确认请求失败</li>
                        </ul>
                    </div>
                `;
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadApp);
        } else {
            loadApp();
        }
    </script>
</body>
</html>
