<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D RPG 编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 500;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #0078d4;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #1084d7;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .toolbar {
            background: #252526;
            border-right: 1px solid #3e3e42;
            padding: 10px;
            width: 120px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .tool-btn {
            background: #3e3e42;
            color: #cccccc;
            border: 1px solid #3e3e42;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: #3e3e42;
            color: #fff;
            border-color: #0078d4;
        }

        .tool-btn.active {
            background: #0078d4;
            color: #fff;
            border-color: #0078d4;
        }

        .canvas-container {
            flex: 1;
            background: #f5f5f5;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        .properties {
            background: #252526;
            border-left: 1px solid #3e3e42;
            width: 280px;
            overflow-y: auto;
            padding: 10px;
            border-top: 1px solid #3e3e42;
        }

        .property-group {
            margin-bottom: 12px;
        }

        .property-group label {
            display: block;
            font-size: 12px;
            color: #cccccc;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .property-group input,
        .property-group textarea {
            width: 100%;
            padding: 6px;
            background: #3e3e42;
            border: 1px solid #3e3e42;
            color: #fff;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
        }

        .property-group input:focus,
        .property-group textarea:focus {
            outline: none;
            border-color: #0078d4;
        }

        .property-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        #propertyPanel {
            color: #cccccc;
            font-size: 12px;
        }

        .footer {
            background: #2d2d30;
            border-top: 1px solid #3e3e42;
            padding: 5px 20px;
            height: 25px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #858585;
        }

        #statusBar {
            flex: 1;
        }

        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: #0078d4;
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📖 2D RPG 编辑器</h1>
            <div class="header-buttons">
                <button class="btn" onclick="editor.saveGame()">💾 保存</button>
                <button class="btn" onclick="window.history.back()">← 返回</button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="section-title">编辑工具</div>
                <button class="tool-btn active" onclick="editor.selectTool('select')" title="选择">✓ 选择</button>
                <button class="tool-btn" onclick="editor.selectTool('npc')" title="NPC">👤 NPC</button>
                <button class="tool-btn" onclick="editor.selectTool('object')" title="物体">📦 物体</button>
                <button class="tool-btn" onclick="editor.selectTool('trigger')" title="触发区">⚡ 触发</button>

                <div class="section-title">系统</div>
                <button class="tool-btn" onclick="editor.editDialogue()" title="对话">💬 对话</button>
                <button class="tool-btn" onclick="editor.editQuests()" title="任务">📋 任务</button>

                <div class="section-title">编辑</div>
                <button class="tool-btn" onclick="editor.undo()" title="撤销">↶ 撤销</button>
                <button class="tool-btn" onclick="editor.redo()" title="重做">↷ 重做</button>
            </div>

            <!-- 画布区 -->
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
            </div>

            <!-- 属性面板 -->
            <div class="properties">
                <div class="section-title">属性</div>
                <div id="propertyPanel">
                    <p>选择一个对象以编辑属性</p>
                </div>
            </div>
        </div>

        <!-- 底部状态栏 -->
        <div class="footer">
            <div id="statusBar">准备就绪</div>
        </div>
    </div>

    <!-- 加载脚本 -->
    <script src="/static/js/unity-editor/Canvas2DUtils.js"></script>
    <script src="/static/js/unity-editor/BaseEditor2D.js"></script>
    <script src="/static/js/unity-editor/EditorFactory.js"></script>

    <script>
        let editor = null;

        // 2D RPG 编辑器类
        class RPG2DEditor extends BaseEditor2D {
            async initializeTools() {
                console.log('📖 初始化 RPG 编辑器工具');
                this.currentTool = 'select';
                this.npcs = [];
                this.dialogues = {};
                this.quests = [];
            }

            initializeUI() {
                // 初始化 UI
            }

            selectTool(toolName) {
                this.currentTool = toolName;
                console.log(`🔧 选择工具: ${toolName}`);

                // 更新按钮状态
                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');

                if (toolName === 'npc') {
                    this.canvas.addEventListener('click', (e) => {
                        const rect = this.canvas.getBoundingClientRect();
                        const x = (e.clientX - rect.left - this.panX) / this.zoom;
                        const y = (e.clientY - rect.top - this.panY) / this.zoom;
                        this.createNPC(x, y);
                    });
                }
            }

            createNPC(x, y) {
                const npc = {
                    id: this.generateId(),
                    x,
                    y,
                    width: 32,
                    height: 32,
                    type: 'npc',
                    name: `NPC_${Date.now()}`,
                    color: '#ff9800',
                    dialogue: [],
                    quests: []
                };
                this.objects.push(npc);
                this.npcs.push(npc);
                this.selectObject(npc);
                this.saveUndoState();
                console.log('👤 NPC 已创建');
            }

            editDialogue() {
                if (!this.selectedObject || this.selectedObject.type !== 'npc') {
                    alert('请先选择一个 NPC');
                    return;
                }

                const dialogue = prompt('输入对话内容:');
                if (dialogue) {
                    if (!this.selectedObject.dialogue) {
                        this.selectedObject.dialogue = [];
                    }
                    this.selectedObject.dialogue.push(dialogue);
                    console.log('💬 对话已添加');
                    this.updateProperties();
                }
            }

            editQuests() {
                if (!this.selectedObject || this.selectedObject.type !== 'npc') {
                    alert('请先选择一个 NPC');
                    return;
                }

                const quest = prompt('输入任务名称:');
                if (quest) {
                    if (!this.selectedObject.quests) {
                        this.selectedObject.quests = [];
                    }
                    this.selectedObject.quests.push({
                        id: this.generateId(),
                        name: quest,
                        status: 'active'
                    });
                    console.log('📋 任务已添加');
                    this.updateProperties();
                }
            }

            render() {
                // 保存当前变换状态
                this.ctx.save();

                // 清空画布
                Canvas2DUtils.clearCanvas(this.canvas);

                // 应用变换
                this.ctx.translate(this.panX, this.panY);
                this.ctx.scale(this.zoom, this.zoom);

                // 绘制网格
                Canvas2DUtils.drawGrid(
                    this.ctx,
                    this.canvas.width / this.zoom,
                    this.canvas.height / this.zoom,
                    32
                );

                // 绘制对象
                this.objects.forEach(obj => {
                    const isSelected = obj === this.selectedObject;

                    // 根据类型选择颜色
                    let color = obj.color || '#667eea';
                    if (obj.type === 'npc') {
                        color = '#ff9800';
                    } else if (obj.type === 'trigger') {
                        color = '#4caf50';
                    }

                    Canvas2DUtils.drawRect(
                        this.ctx,
                        obj.x, obj.y, obj.width, obj.height,
                        color,
                        isSelected ? '#333' : null,
                        isSelected ? 2 : 0
                    );

                    // 绘制对象标签
                    if (obj.type === 'npc' && obj.name) {
                        Canvas2DUtils.drawText(
                            this.ctx,
                            obj.name,
                            obj.x + 5, obj.y + 5,
                            { fontSize: 10, color: '#fff' }
                        );
                    }
                });

                // 恢复变换状态
                this.ctx.restore();

                // 绘制 UI 信息
                this.renderUI();
            }
        }

        // 页面加载完成后初始化编辑器
        window.addEventListener('DOMContentLoaded', async () => {
            // 获取游戏 ID（从 URL 参数或新游戏）
            const params = new URLSearchParams(window.location.search);
            const gameId = params.get('gameId');

            // 创建编辑器实例
            editor = new RPG2DEditor(
                {
                    name: '2D RPG 编辑器',
                    engine: 'canvas2d',
                    tools: ['npc-editor', 'dialogue-editor', 'quest-system'],
                    canvasSize: { width: window.innerWidth - 400, height: window.innerHeight - 80 },
                    gridSize: 32,
                    initialZoom: 1.0
                },
                gameId
            );

            // 初始化编辑器
            const initialized = await editor.initialize();
            if (initialized) {
                console.log('📖 RPG 编辑器已启动');
            }
        });

        // 窗口大小调整时重新计算画布大小
        window.addEventListener('resize', () => {
            if (editor && editor.canvas) {
                editor.canvas.width = window.innerWidth - 400;
                editor.canvas.height = window.innerHeight - 80;
            }
        });

        // 提示用户保存
        window.addEventListener('beforeunload', (e) => {
            if (editor && editor.undoStack.length > 0) {
                e.preventDefault();
                e.returnValue = '您有未保存的更改';
            }
        });
    </script>
</body>
</html>
