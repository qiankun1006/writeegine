<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏创建 - WriteEngine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .portal-container {
      max-width: 1200px;
      width: 100%;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 60px;
    }

    .header h1 {
      font-size: 42px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .header p {
      font-size: 18px;
      opacity: 0.9;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    .game-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      min-height: 400px;
      display: flex;
      flex-direction: column;
    }

    .game-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .card-icon {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .card-icon.strategy {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card-icon.metroidvania {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .card-icon.rpg {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .card-icon.shooter {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }

    .card-content {
      padding: 30px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #333;
    }

    .card-description {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      flex: 1;
      line-height: 1.6;
    }

    .card-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-new {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-new:hover {
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-open {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-open:hover {
      background: #e8e8e8;
    }

    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .games-list {
      position: fixed;
      top: 0;
      right: 0;
      width: 300px;
      height: 100vh;
      background: white;
      box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 999;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .games-list.active {
      transform: translateX(0);
    }

    .games-list-header {
      padding: 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .games-list-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }

    .games-list-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .game-item {
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 6px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .game-item:hover {
      background: #f9f9f9;
      border-color: #667eea;
    }

    .game-item-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }

    .game-item-type {
      font-size: 12px;
      color: #999;
    }

    @media (max-width: 768px) {
      .cards-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .header h1 {
        font-size: 28px;
      }

      .header p {
        font-size: 14px;
      }

      .card-content {
        padding: 20px;
      }

      .card-title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

<div class="portal-container">
  <div class="header">
    <h1>🎮 选择您的游戏类型</h1>
    <p>选择要开发的游戏类型，进入对应的轻量化编辑器</p>
  </div>

  <div class="cards-grid">
    <!-- 2D 策略战棋卡片 -->
    <div class="game-card" onclick="selectGameType('2d-strategy')">
      <div class="card-icon strategy">🗺️</div>
      <div class="card-content">
        <div class="card-title">2D 策略战棋</div>
        <div class="card-description">
          网格制游戏，支持寻路、战斗预览、单位管理等功能
        </div>
        <div class="card-buttons">
          <button class="btn btn-new" onclick="createNewGame('2d-strategy', event)">新建游戏</button>
          <button class="btn btn-open" onclick="openGameList('2d-strategy', event)">打开</button>
        </div>
      </div>
    </div>

    <!-- 2D 恶魔城卡片 -->
    <div class="game-card" onclick="selectGameType('2d-metroidvania')">
      <div class="card-icon metroidvania">🧛</div>
      <div class="card-content">
        <div class="card-title">2D 恶魔城</div>
        <div class="card-description">
          横版冒险游戏，支持碰撞体编辑、物理模拟、平台跳跃
        </div>
        <div class="card-buttons">
          <button class="btn btn-new" onclick="createNewGame('2d-metroidvania', event)">新建游戏</button>
          <button class="btn btn-open" onclick="openGameList('2d-metroidvania', event)">打开</button>
        </div>
      </div>
    </div>

    <!-- 2D RPG 卡片 -->
    <div class="game-card" onclick="selectGameType('2d-rpg')">
      <div class="card-icon rpg">🎭</div>
      <div class="card-content">
        <div class="card-title">2D 角色扮演</div>
        <div class="card-description">
          RPG 游戏，支持 NPC、对话系统、任务管理、存档
        </div>
        <div class="card-buttons">
          <button class="btn btn-new" onclick="createNewGame('2d-rpg', event)">新建游戏</button>
          <button class="btn btn-open" onclick="openGameList('2d-rpg', event)">打开</button>
        </div>
      </div>
    </div>

    <!-- 3D 射击卡片 -->
    <div class="game-card" onclick="selectGameType('3d-shooter')">
      <div class="card-icon shooter">🔫</div>
      <div class="card-content">
        <div class="card-title">3D 射击</div>
        <div class="card-description">
          第一/第三人称射击，支持光照、粒子效果、网络同步
        </div>
        <div class="card-buttons">
          <button class="btn btn-new" onclick="createNewGame('3d-shooter', event)">新建游戏</button>
          <button class="btn btn-open" onclick="openGameList('3d-shooter', event)">打开</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 加载动画 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<!-- 游戏列表侧边栏 -->
<div class="games-list" id="gamesList">
  <div class="games-list-header">
    <h3>我的游戏</h3>
    <button class="games-list-close" onclick="closeGamesList()">×</button>
  </div>
  <div class="games-list-content" id="gamesListContent">
    <p style="color: #999; text-align: center; padding: 20px;">加载中...</p>
  </div>
</div>

<script>
  // 当前选择的游戏类型
  let currentGameType = null;

  /**
   * 选择游戏类型
   */
  function selectGameType(type) {
    currentGameType = type;
  }

  /**
   * 创建新游戏
   */
  function createNewGame(type, event) {
    event.stopPropagation();

    const gameName = prompt(`请输入 ${getGameTypeName(type)} 游戏名称:`);
    if (!gameName) return;

    showLoading();

    // 调用后端 API 创建游戏
    fetch(`/api/game/create?name=${encodeURIComponent(gameName)}&type=${type}&description=`, {
      method: 'POST'
    })
      .then(response => response.json())
      .then(data => {
        hideLoading();
        if (data.success && data.data) {
          // 跳转到编辑器页面
          window.location.href = `/create-game/unity/${type}?gameId=${data.data.id}`;
        } else {
          alert('创建游戏失败: ' + (data.error || '未知错误'));
        }
      })
      .catch(error => {
        hideLoading();
        alert('创建游戏失败: ' + error.message);
      });
  }

  /**
   * 打开游戏列表
   */
  function openGameList(type, event) {
    event.stopPropagation();
    currentGameType = type;

    const gamesList = document.getElementById('gamesList');
    const content = document.getElementById('gamesListContent');

    gamesList.classList.add('active');
    content.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">加载中...</p>';

    // 调用后端 API 获取游戏列表
    fetch(`/api/game/list?type=${type}`)
      .then(response => response.json())
      .then(data => {
        if (data.success && data.games && data.games.length > 0) {
          content.innerHTML = data.games.map(game => `
            <div class="game-item" onclick="selectGame('${game.id}', '${type}')">
              <div class="game-item-name">${game.name}</div>
              <div class="game-item-type">${getGameTypeName(type)}</div>
            </div>
          `).join('');
        } else {
          content.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">还没有游戏，请先创建一个</p>';
        }
      })
      .catch(error => {
        content.innerHTML = `<p style="color: red; text-align: center; padding: 20px;">加载失败: ${error.message}</p>`;
      });
  }

  /**
   * 选择游戏
   */
  function selectGame(gameId, type) {
    window.location.href = `/create-game/unity/${type}?gameId=${gameId}`;
  }

  /**
   * 关闭游戏列表
   */
  function closeGamesList() {
    document.getElementById('gamesList').classList.remove('active');
  }

  /**
   * 显示加载动画
   */
  function showLoading() {
    document.getElementById('loadingOverlay').classList.add('active');
  }

  /**
   * 隐藏加载动画
   */
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('active');
  }

  /**
   * 获取游戏类型名称
   */
  function getGameTypeName(type) {
    const names = {
      '2d-strategy': '2D 策略战棋',
      '2d-metroidvania': '2D 恶魔城',
      '2d-rpg': '2D 角色扮演',
      '3d-shooter': '3D 射击'
    };
    return names[type] || type;
  }

  // 点击外部关闭游戏列表
  document.addEventListener('click', function(event) {
    const gamesList = document.getElementById('gamesList');
    if (!gamesList.contains(event.target) && event.target.className !== 'btn btn-open') {
      gamesList.classList.remove('active');
    }
  });
</script>

</body>
</html>
