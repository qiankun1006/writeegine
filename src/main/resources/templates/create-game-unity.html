<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity 编辑器 - WriteEngine</title>
  <link rel="stylesheet" href="/static/css/unity-editor.css">
  <!-- Three.js 库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- OrbitControls 控制器 -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <!-- Ammo.js 物理引擎 -->
  <script src="https://cdn.jsdelivr.net/npm/ammo.js@0.0.10/builds/ammo.wasm.js"></script>
</head>
<body>

<!-- 页面加载诊断脚本 -->
<script>
  console.log('%c🚀 Unity 编辑器页面开始加载', 'color: blue; font-weight: bold; font-size: 14px');
  console.log('时间:', new Date().toLocaleTimeString());
  console.log('浏览器:', navigator.userAgent.split(' ').slice(-2).join(' '));
</script>

<div class="unity-editor-container">
    <!-- 顶部工具栏 -->
    <div class="toolbar">
        <!-- 文件操作 -->
        <div class="toolbar-group">
            <button class="toolbar-btn" id="btnNewScene" title="新建场景 (Ctrl+N)">
                <span class="icon">📄</span> 新建
            </button>
            <button class="toolbar-btn" id="btnOpenScene" title="打开场景 (Ctrl+O)">
                <span class="icon">📂</span> 打开
            </button>
            <button class="toolbar-btn" id="btnSaveScene" title="保存场景 (Ctrl+S)">
                <span class="icon">💾</span> 保存
            </button>
            <button class="toolbar-btn" id="btnExportScene" title="导出场景">
                <span class="icon">📤</span> 导出
            </button>
        </div>

        <!-- 编辑工具 -->
        <div class="toolbar-group">
            <button class="toolbar-btn active" id="btnSelectTool" title="选择工具 (Q)">
                <span class="icon">🖱️</span> 选择
            </button>
            <button class="toolbar-btn" id="btnMoveTool" title="移动工具 (W)">
                <span class="icon">↔️</span> 移动
            </button>
            <button class="toolbar-btn" id="btnRotateTool" title="旋转工具 (E)">
                <span class="icon">🔄</span> 旋转
            </button>
            <button class="toolbar-btn" id="btnScaleTool" title="缩放工具 (R)">
                <span class="icon">📏</span> 缩放
            </button>
        </div>

        <!-- 创建工具 -->
        <div class="toolbar-group">
            <button class="toolbar-btn" id="btnCreateCube" title="创建立方体">
                <span class="icon">⬛</span> 立方体
            </button>
            <button class="toolbar-btn" id="btnCreateSphere" title="创建球体">
                <span class="icon">⚪</span> 球体
            </button>
            <button class="toolbar-btn" id="btnCreateCylinder" title="创建圆柱体">
                <span class="icon">🔘</span> 圆柱体
            </button>
            <button class="toolbar-btn" id="btnCreatePlane" title="创建平面">
                <span class="icon">⬜</span> 平面
            </button>
        </div>

        <!-- 操作工具 -->
        <div class="toolbar-group">
            <button class="toolbar-btn" id="btnUndo" title="撤销 (Ctrl+Z)">
                <span class="icon">↩️</span> 撤销
            </button>
            <button class="toolbar-btn" id="btnRedo" title="重做 (Ctrl+Shift+Z)">
                <span class="icon">↪️</span> 重做
            </button>
            <button class="toolbar-btn" id="btnDelete" title="删除 (Delete)">
                <span class="icon">🗑️</span> 删除
            </button>
            <button class="toolbar-btn" id="btnDuplicate" title="复制 (Ctrl+D)">
                <span class="icon">📋</span> 复制
            </button>
        </div>

        <!-- 视图控制 -->
        <div class="toolbar-group">
            <button class="toolbar-btn" id="btnPerspectiveView" title="透视视图">
                <span class="icon">👁️</span> 透视
            </button>
            <button class="toolbar-btn" id="btnTopView" title="顶视图">
                <span class="icon">⬇️</span> 顶视
            </button>
            <button class="toolbar-btn" id="btnFrontView" title="前视图">
                <span class="icon">⬆️</span> 前视
            </button>
            <button class="toolbar-btn" id="btnSideView" title="侧视图">
                <span class="icon">➡️</span> 侧视
            </button>
        </div>

        <!-- 物理控制 -->
        <div class="toolbar-group">
            <button class="toolbar-btn" id="btnPhysicsToggle" title="启用/禁用物理">
                <span class="icon">⚙️</span> 物理
            </button>
            <button class="toolbar-btn" id="btnSimulatePhysics" title="模拟物理">
                <span class="icon">▶️</span> 模拟
            </button>
            <button class="toolbar-btn" id="btnResetPhysics" title="重置物理">
                <span class="icon">🔄</span> 重置
            </button>
        </div>
    </div>

    <!-- 主编辑器区域 -->
    <div class="editor-main">
        <!-- 左侧面板：场景层级 -->
        <div class="panel-left" id="hierarchyPanel">
            <div class="panel-header">
                <h3>场景层级</h3>
                <button class="panel-btn" id="btnAddObject" title="添加对象">+</button>
            </div>
            <div class="panel-content">
                <ul class="hierarchy-tree" id="hierarchyTree">
                    <!-- 场景对象树状结构将在这里动态生成 -->
                </ul>
            </div>
        </div>

        <!-- 中央面板：3D 视图 -->
        <div class="panel-center" id="viewportPanel">
            <div class="panel-header">
                <h3>3D 视图</h3>
                <div class="viewport-controls">
                    <button class="panel-btn" id="btnToggleGrid" title="显示/隐藏网格">网格</button>
                    <button class="panel-btn" id="btnToggleAxes" title="显示/隐藏坐标轴">坐标轴</button>
                    <button class="panel-btn" id="btnToggleWireframe" title="线框模式">线框</button>
                    <button class="panel-btn" id="btnToggleShadows" title="显示/隐藏阴影">阴影</button>
                </div>
            </div>
            <div class="panel-content">
                <canvas id="unityCanvas"></canvas>
                <div class="viewport-info" id="viewportInfo">
                    <span>FPS: <span id="fpsCounter">0</span></span>
                    <span>对象: <span id="objectCount">0</span></span>
                    <span>工具: <span id="currentTool">选择</span></span>
                </div>
            </div>
        </div>

        <!-- 右侧面板：属性编辑器 -->
        <div class="panel-right" id="inspectorPanel">
            <div class="panel-header">
                <h3>属性检查器</h3>
                <button class="panel-btn" id="btnResetProperties" title="重置属性">重置</button>
            </div>
            <div class="panel-content">
                <div class="property-section" id="transformSection">
                    <h4>变换</h4>
                    <div class="property-group">
                        <label>位置</label>
                        <div class="vector-input">
                            <input type="number" id="posX" placeholder="X" step="0.1">
                            <input type="number" id="posY" placeholder="Y" step="0.1">
                            <input type="number" id="posZ" placeholder="Z" step="0.1">
                        </div>
                    </div>
                    <div class="property-group">
                        <label>旋转</label>
                        <div class="vector-input">
                            <input type="number" id="rotX" placeholder="X" step="1" min="0" max="360">
                            <input type="number" id="rotY" placeholder="Y" step="1" min="0" max="360">
                            <input type="number" id="rotZ" placeholder="Z" step="1" min="0" max="360">
                        </div>
                    </div>
                    <div class="property-group">
                        <label>缩放</label>
                        <div class="vector-input">
                            <input type="number" id="scaleX" placeholder="X" step="0.1" min="0.1" max="10">
                            <input type="number" id="scaleY" placeholder="Y" step="0.1" min="0.1" max="10">
                            <input type="number" id="scaleZ" placeholder="Z" step="0.1" min="0.1" max="10">
                            <label class="checkbox-label">
                                <input type="checkbox" id="uniformScale" checked> 等比缩放
                            </label>
                        </div>
                    </div>
                </div>

                <div class="property-section" id="materialSection">
                    <h4>材质</h4>
                    <div class="property-group">
                        <label>材质类型</label>
                        <select id="materialType">
                            <option value="basic">基础材质</option>
                            <option value="standard">标准材质</option>
                            <option value="phong">Phong 材质</option>
                        </select>
                    </div>
                    <div class="property-group">
                        <label>颜色</label>
                        <input type="color" id="materialColor" value="#ffffff">
                    </div>
                    <div class="property-group">
                        <label>金属度</label>
                        <input type="range" id="materialMetalness" min="0" max="1" step="0.01" value="0.5">
                        <span id="metalnessValue">0.5</span>
                    </div>
                    <div class="property-group">
                        <label>粗糙度</label>
                        <input type="range" id="materialRoughness" min="0" max="1" step="0.01" value="0.5">
                        <span id="roughnessValue">0.5</span>
                    </div>
                </div>

                <div class="property-section" id="physicsSection">
                    <h4>物理</h4>
                    <div class="property-group">
                        <label>刚体类型</label>
                        <select id="rigidbodyType">
                            <option value="static">静态</option>
                            <option value="dynamic">动态</option>
                            <option value="kinematic">运动学</option>
                        </select>
                    </div>
                    <div class="property-group">
                        <label>质量</label>
                        <input type="number" id="physicsMass" min="0" step="0.1" value="1.0">
                    </div>
                    <div class="property-group">
                        <label>摩擦力</label>
                        <input type="range" id="physicsFriction" min="0" max="1" step="0.01" value="0.5">
                        <span id="frictionValue">0.5</span>
                    </div>
                    <div class="property-group">
                        <label>弹性</label>
                        <input type="range" id="physicsRestitution" min="0" max="1" step="0.01" value="0.3">
                        <span id="restitutionValue">0.3</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部面板：资源库 -->
        <div class="panel-bottom" id="assetPanel">
            <div class="panel-header">
                <h3>资源库</h3>
                <div class="asset-tabs">
                    <button class="tab-btn active" data-tab="geometries">几何体</button>
                    <button class="tab-btn" data-tab="materials">材质</button>
                    <button class="tab-btn" data-tab="textures">纹理</button>
                    <button class="tab-btn" data-tab="prefabs">预制体</button>
                </div>
            </div>
            <div class="panel-content">
                <div class="asset-grid" id="assetGrid">
                    <!-- 资源库内容将在这里动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-item">
            <span id="statusMessage">就绪</span>
        </div>
        <div class="status-item">
            <span>选择: <span id="selectedCount">0</span> 个对象</span>
        </div>
        <div class="status-item">
            <span>网格: <span id="gridSnap">1.0</span></span>
        </div>
        <div class="status-item">
            <span>角度: <span id="angleSnap">15°</span></span>
        </div>
        <div class="status-item">
            <span>物理: <span id="physicsStatus">禁用</span></span>
        </div>
    </div>
</div>

<!-- 模态对话框 -->
<div class="modal" id="importModal" style="display: none;">
    <div class="modal-content">
        <h3>导入场景</h3>
        <div class="modal-body">
            <p>选择要导入的场景文件格式：</p>
            <div class="import-options">
                <button class="modal-btn" data-format="json">JSON 场景文件</button>
                <button class="modal-btn" data-format="gltf">glTF 3D 模型</button>
                <button class="modal-btn" data-format="obj">OBJ 3D 模型</button>
            </div>
            <div class="file-input-container" style="display: none;" id="fileInputContainer">
                <input type="file" id="sceneFileInput" accept=".json,.gltf,.glb,.obj">
                <button class="modal-btn" id="btnImportFile">导入文件</button>
            </div>
        </div>
        <div class="modal-footer">
            <button class="modal-btn secondary" id="btnCancelImport">取消</button>
        </div>
    </div>
</div>

<div class="modal" id="exportModal" style="display: none;">
    <div class="modal-content">
        <h3>导出场景</h3>
        <div class="modal-body">
            <p>选择导出格式：</p>
            <div class="export-options">
                <label class="radio-label">
                    <input type="radio" name="exportFormat" value="json" checked>
                    JSON 场景文件 (.json)
                </label>
                <label class="radio-label">
                    <input type="radio" name="exportFormat" value="gltf">
                    glTF 3D 模型 (.gltf)
                </label>
                <label class="radio-label">
                    <input type="radio" name="exportFormat" value="glb">
                    二进制 glTF (.glb)
                </label>
                <label class="radio-label">
                    <input type="radio" name="exportFormat" value="obj">
                    OBJ 3D 模型 (.obj)
                </label>
            </div>
            <div class="export-settings">
                <label class="checkbox-label">
                    <input type="checkbox" id="exportTextures" checked>
                    包含纹理
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="exportAnimations" checked>
                    包含动画
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="exportPhysics" checked>
                    包含物理数据
                </label>
            </div>
        </div>
        <div class="modal-footer">
            <button class="modal-btn secondary" id="btnCancelExport">取消</button>
            <button class="modal-btn primary" id="btnConfirmExport">导出</button>
        </div>
    </div>
</div>

<!-- 脚本文件 -->
<script src="/static/js/unity-editor/UnityRenderer.js"></script>
<script src="/static/js/unity-editor/UnityEditor.js"></script>
<script src="/static/js/unity-editor/UnityPhysics.js"></script>
<script src="/static/js/unity-editor/UnityUI.js"></script>
<script src="/static/js/unity-editor/app.js"></script>

</body>
</html>
