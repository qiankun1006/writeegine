<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">WriteMyself</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link rel="icon" th:href="@{/static/images/favicon.svg}" type="image/svg+xml">
    <style>
        /* 深色游戏引擎主题 */
        body {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            background-attachment: fixed;
            color: #e8e9ea;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a th:href="@{/}">首页</a>
            <a th:href="@{/about}">关于</a>
        </nav>
    </header>

    <main>
        <!-- 内容区域，被子模板通过layout:fragment="content"替换 -->
        <div layout:fragment="content">
            <p>默认内容</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 WriteMyself. All rights reserved.</p>
    </footer>

    <script th:src="@{/static/js/main.js}"></script>
    <script src="/static/js/tilemap-editor.js"></script>
</body>
</html>
