<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">WriteMyself</title>
    <!-- 全局主题CSS -->
    <link rel="stylesheet" th:href="@{/static/css/theme.css}">
    <!-- 旧样式（向后兼容） -->
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link rel="icon" th:href="@{/static/images/favicon.svg}" type="image/svg+xml">
</head>
<body>
    <!-- 页面导航可以由各个页面的导航栏覆盖（如首页的 .homepage-nav）-->
    <!-- 对于其他页面，保留基础导航 -->

    <main>
        <!-- 内容区域，被子模板通过layout:fragment="content"替换 -->
        <div layout:fragment="content">
            <p>默认内容</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 WriteMyself. All rights reserved.</p>
    </footer>

    <script th:src="@{/static/js/main.js}"></script>
    <!-- 图片编辑器脚本（仅在需要的页面加载） -->
    <script src="/static/js/image-editor/EventBus.js"></script>
    <script src="/static/js/image-editor/CommandHistory.js"></script>
    <script src="/static/js/image-editor/Layer.js"></script>
    <script src="/static/js/image-editor/Tool.js"></script>
    <script src="/static/js/image-editor/CanvasRenderer.js"></script>
    <script src="/static/js/image-editor/ImageEditor.js"></script>
    <script src="/static/js/image-editor/tools/SelectionTools.js"></script>
    <script src="/static/js/image-editor/tools/PaintingTools.js"></script>
    <script src="/static/js/image-editor/app.js"></script>
    <script src="/static/js/image-editor/MenuManager.js"></script>

    <!-- 游戏素材创作系统脚本（用于 create-game-asset 页面） -->
    <script src="/static/js/game-asset-creator/AssetManager.js"></script>
    <script src="/static/js/game-asset-creator/AssetEditor.js"></script>
    <script src="/static/js/game-asset-creator/CanvasUtils.js"></script>
    <script src="/static/js/game-asset-creator/app.js"></script>

    <!-- 骨骼动画系统脚本 -->
    <link rel="stylesheet" href="/static/css/skeleton-animation.css">
    <script src="/static/js/image-editor/skeleton/core/Matrix2D.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Bone.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Skeleton.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Keyframe.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Track.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Animation.js"></script>
    <script src="/static/js/image-editor/skeleton/core/AnimationPlayer.js"></script>
    <script src="/static/js/image-editor/skeleton/core/Skin.js"></script>
    <script src="/static/js/image-editor/skeleton/core/SkeletonCommands.js"></script>
    <script src="/static/js/image-editor/skeleton/core/ExportManager.js"></script>
    <script src="/static/js/image-editor/skeleton/ui/BoneHierarchyPanel.js"></script>
    <script src="/static/js/image-editor/skeleton/ui/Timeline.js"></script>
    <script src="/static/js/image-editor/skeleton/ui/BonePropertyPanel.js"></script>
    <script src="/static/js/image-editor/skeleton/ui/SkeletonAnimationEditor.js?v=2"></script>
    <script src="/static/js/image-editor/skeleton/tools/BoneEditTool.js"></script>
    <script src="/static/js/image-editor/skeleton/init.js"></script>
    <script src="/static/js/game-asset-creator/FrameSequenceEditor.js?v=2"></script>

    <!-- Tilemap 编辑器脚本 -->
    <script src="/static/js/tilemap-editor.js"></script>
</body>
</html>
