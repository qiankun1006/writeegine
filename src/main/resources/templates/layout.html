<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">WriteMyself</title>
    <!-- 全局主题CSS -->
    <link rel="stylesheet" th:href="@{/static/css/theme.css}">
    <!-- 旧样式（向后兼容） -->
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link rel="icon" th:href="@{/static/images/favicon.svg}" type="image/svg+xml">
</head>
<body>
    <!-- 页面导航可以由各个页面的导航栏覆盖（如首页的 .homepage-nav）-->
    <!-- 对于其他页面，保留基础导航 -->

    <main>
        <!-- 内容区域，被子模板通过layout:fragment="content"替换 -->
        <div layout:fragment="content">
            <p>默认内容</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 WriteMyself. All rights reserved.</p>
    </footer>

    <script th:src="@{/static/js/main.js}"></script>
    <script src="/static/js/tilemap-editor.js"></script>
    <script src="/static/js/image-editor/EventBus.js"></script>
    <script src="/static/js/image-editor/CommandHistory.js"></script>
    <script src="/static/js/image-editor/Layer.js"></script>
    <script src="/static/js/image-editor/Tool.js"></script>
    <script src="/static/js/image-editor/CanvasRenderer.js"></script>
    <script src="/static/js/image-editor/ImageEditor.js"></script>
    <script src="/static/js/image-editor/tools/SelectionTools.js"></script>
    <script src="/static/js/image-editor/tools/PaintingTools.js"></script>
    <script src="/static/js/image-editor/app.js"></script>
