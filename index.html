<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>UI 布局可视化编辑器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Segoe UI',sans-serif;background:#12121f;color:#dde;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── 顶栏 ── */
#topbar{background:#1a1a30;border-bottom:1px solid #2a2a50;padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-size:14px;color:#e94560;font-weight:700;white-space:nowrap}
.sep{flex:1}
.tbtn{background:#0f2040;color:#ccd;border:1px solid #3a3a60;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap}
.tbtn:hover{background:#e94560;color:#fff;border-color:#e94560}
.tbtn.red{background:#e94560;color:#fff;border-color:#e94560}
.tbtn.red:hover{background:#c73652}
#snap-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:#aab;cursor:pointer;user-select:none}
#snap-toggle input{accent-color:#e94560;width:14px;height:14px;cursor:pointer}
#snap-dist-wrap{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
#snap-dist-wrap input{width:40px;background:#0d0d1a;border:1px solid #2a2a50;border-radius:3px;color:#ccd;padding:2px 4px;font-size:11px;text-align:center}

/* ── 主区 ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── 左侧面板 ── */
#sidebar{width:240px;flex-shrink:0;background:#1a1a30;border-right:1px solid #2a2a50;display:flex;flex-direction:column;overflow:hidden}
#sidebar-head{padding:8px 10px;border-bottom:1px solid #2a2a50;display:flex;align-items:center;gap:6px;flex-shrink:0}
#sidebar-head span{flex:1;font-size:12px;font-weight:600;color:#aac}
#sidebar-scroll{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:1px}

/* 类型分组 */
.type-group{}
.type-header{display:flex;align-items:center;gap:5px;padding:5px 6px 3px;border-bottom:1px solid #232345;cursor:default;user-select:none}
.type-header .type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.type-header .type-name{flex:1;font-size:11px;font-weight:600;color:#99b;letter-spacing:.3px}
.type-del-btn{font-size:10px;color:#f38ba8;cursor:pointer;padding:1px 4px;border-radius:2px;opacity:.6;flex-shrink:0}
.type-del-btn:hover{opacity:1;background:rgba(243,139,168,.15)}

/* 元素行 */
.el-row{display:flex;align-items:center;gap:5px;padding:4px 6px 4px 14px;border-radius:3px;cursor:pointer;border:1px solid transparent;transition:all .12s}
.el-row:hover{border-color:#e94560;background:#1e2a4a}
.el-row.active{border-color:#e94560;background:#1e2a4a}
.el-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.el-name{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.el-ic{font-size:10px;cursor:pointer;padding:1px 3px;border-radius:2px;opacity:.55;transition:opacity .12s,background .12s;flex-shrink:0;line-height:1.4}
.el-ic:hover{opacity:1}
.el-del:hover{background:rgba(243,139,168,.2);color:#f38ba8}

/* ── 画布 ── */
#canvas-wrap{flex:1;overflow:auto;background:#0c0c18;display:flex;align-items:center;justify-content:center}
#canvas-container{position:relative;flex-shrink:0}
#bg-canvas{display:block;position:absolute;top:0;left:0}
#overlay{position:absolute;top:0;left:0;pointer-events:none}

/* 对齐参考线 */
.snap-line{position:absolute;pointer-events:none;z-index:100}
.snap-line-x{width:1px;top:0;bottom:0;background:rgba(233,69,96,.7)}
.snap-line-y{height:1px;left:0;right:0;background:rgba(233,69,96,.7)}

/* 可拖拽框 */
.dbox{position:absolute;border:2px solid;border-radius:3px;cursor:move;user-select:none;pointer-events:all;transition:filter .1s}
.dbox:hover{filter:brightness(1.35)}
.dbox.sel{filter:brightness(1.6)}
.dbox .blabel{font-size:10px;padding:1px 4px;background:rgba(0,0,0,.7);border-radius:2px;white-space:nowrap;pointer-events:none;position:absolute;bottom:2px;left:2px;line-height:1.5}

/* 8方向 resize handle */
.rh{position:absolute;pointer-events:all;z-index:10}
.rh-corner{width:13px;height:13px;background:#fff;border:2px solid #e94560;border-radius:3px;box-shadow:0 0 4px rgba(233,69,96,.8)}
.rh-corner:hover{background:#e94560;transform:scale(1.3)}
.rh-edge-h{height:5px;background:rgba(233,69,96,.45);border-radius:3px;left:13px}
.rh-edge-v{width:5px;background:rgba(233,69,96,.45);border-radius:3px;top:13px}
.rh-edge-h:hover,.rh-edge-v:hover{background:rgba(233,69,96,.9)}
.rh-nw{cursor:nw-resize;top:-5px;left:-5px}
.rh-ne{cursor:ne-resize;top:-5px;right:-5px}
.rh-sw{cursor:sw-resize;bottom:-5px;left:-5px}
.rh-se{cursor:se-resize;bottom:-5px;right:-5px}
.rh-n{cursor:n-resize;top:-3px;right:13px;left:13px}
.rh-s{cursor:s-resize;bottom:-3px;right:13px;left:13px}
.rh-w{cursor:w-resize;left:-3px;top:13px;bottom:13px}
.rh-e{cursor:e-resize;right:-3px;top:13px;bottom:13px}
.dbox .rh{opacity:0;transition:opacity .15s}
.dbox:hover .rh,.dbox.sel .rh{opacity:1}

/* ── 右侧 JSON 面板 ── */
#json-panel{width:300px;flex-shrink:0;background:#1a1a30;border-left:1px solid #2a2a50;display:flex;flex-direction:column;overflow:hidden}
#json-panel .ph{padding:7px 12px;font-size:12px;font-weight:600;border-bottom:1px solid #2a2a50;flex-shrink:0;color:#aac}
#json-output{flex:1;overflow-y:auto;padding:9px;font-size:11px;line-height:1.6;font-family:'Fira Code','Consolas',monospace;white-space:pre;color:#cdd6f4;background:#0c0c18}
#props-panel{padding:9px;border-top:1px solid #2a2a50;flex-shrink:0;max-height:190px;overflow-y:auto}
#props-panel h4{color:#e94560;margin-bottom:7px;font-size:11px}
.prow{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.prow label{width:75px;color:#888;font-size:11px;flex-shrink:0}
.prow input{flex:1;background:#0c0c18;border:1px solid #2a2a50;border-radius:3px;color:#dde;padding:3px 5px;font-size:11px}
.prow input:focus{outline:none;border-color:#e94560}

/* 缩放控制 */
#zoom-ctrl{display:flex;align-items:center;gap:5px;font-size:12px}
#zoom-ctrl button{padding:3px 7px;font-size:12px}
#zoom-val{min-width:38px;text-align:center;color:#e94560;font-weight:bold}

/* JSON 高亮 */
.jk{color:#89b4fa}.js{color:#a6e3a1}.jn{color:#fab387}.jb{color:#cba6f7}.jnl{color:#f38ba8}

/* 提示条 */
#hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(233,69,96,.9);color:#fff;padding:6px 18px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:9999}
#hint.show{opacity:1}

/* ── 弹窗 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#1a1a30;border:1px solid #3a3a60;border-radius:8px;padding:22px 24px;width:380px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal h3{color:#e94560;font-size:14px;margin-bottom:16px}
.modal label{display:block;font-size:11px;color:#888;margin-bottom:4px;margin-top:10px}
.modal input,.modal select{width:100%;background:#0c0c18;border:1px solid #2a2a50;border-radius:4px;color:#dde;padding:6px 9px;font-size:13px}
.modal input:focus,.modal select:focus{outline:none;border-color:#e94560}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.modal select option{background:#1a1a30}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.color-swatch{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.color-swatch.picked{border-color:#fff}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- 顶栏 -->
<div id="topbar">
  <h1>🎮 UI 布局编辑器</h1>
  <div id="zoom-ctrl">
    <button class="tbtn" onclick="setZoom(zoom-.1)">－</button>
    <span id="zoom-val">100%</span>
    <button class="tbtn" onclick="setZoom(zoom+.1)">＋</button>
    <button class="tbtn" onclick="setZoom(1)">重置</button>
  </div>
  <label id="snap-toggle" title="拖拽时靠近另一个框的边/中线会自动吸附对齐">
    <input type="checkbox" id="snap-cb" checked /> 自动对齐
  </label>
  <div id="snap-dist-wrap">
    吸附距离 <input type="number" id="snap-dist" value="8" min="2" max="30" /> px
  </div>
  <div class="sep"></div>
  <label style="font-size:12px;color:#888">背景图：</label>
  <input type="file" id="bg-file" accept="image/*" style="font-size:11px;color:#ccc;background:#0c0c18;border:1px solid #2a2a50;border-radius:3px;padding:3px 6px"/>
  <button class="tbtn" onclick="document.getElementById('json-file').click()">📂 加载 JSON</button>
  <input type="file" id="json-file" accept=".json" style="display:none"/>
  <button class="tbtn red" onclick="copyJson()">📋 复制 JSON</button>
  <button class="tbtn red" onclick="downloadJson()">⬇ 下载</button>
</div>

<!-- 主区 -->
<div id="main">
  <!-- 左侧 -->
  <div id="sidebar">
    <div id="sidebar-head">
      <span>元素列表</span>
      <button class="tbtn" style="padding:3px 9px;font-size:11px" onclick="openAddModal()">＋ 新增</button>
      <button class="tbtn" style="padding:3px 9px;font-size:11px" onclick="openTypeModal()">⚙ 类型</button>
    </div>
    <div id="sidebar-scroll"></div>
  </div>

  <!-- 画布 -->
  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="bg-canvas"></canvas>
      <div id="overlay"></div>
    </div>
  </div>

  <!-- JSON 面板 -->
  <div id="json-panel">
    <div class="ph">实时 JSON 输出</div>
    <div id="json-output"></div>
    <div id="props-panel" class="hidden">
      <h4 id="props-title">选中元素</h4>
      <div id="props-fields"></div>
    </div>
  </div>
</div>

<div id="hint"></div>

<!-- ══ 新增元素弹窗 ══ -->
<div id="add-modal" class="modal-bg hidden">
  <div class="modal">
    <h3>➕ 新增元素</h3>
    <label>元素名称</label>
    <input id="add-name" placeholder="例如：装备按钮、头像框…" maxlength="20"/>
    <label>所属类型 <span style="color:#888;font-size:10px">（决定写入 JSON 哪个数组）</span></label>
    <select id="add-type"></select>
    <label>颜色</label>
    <div class="color-row" id="add-color-row"></div>
    <input type="hidden" id="add-color-val"/>
    <div class="modal-foot">
      <button class="tbtn" onclick="closeAddModal()">取消</button>
      <button class="tbtn red" onclick="confirmAdd()">确认新增</button>
    </div>
  </div>
</div>

<!-- ══ 类型管理弹窗 ══ -->
<div id="type-modal" class="modal-bg hidden">
  <div class="modal">
    <h3>⚙ 类型管理</h3>
    <p style="font-size:11px;color:#666;margin-bottom:12px">同一类型的元素写入 JSON 中同名的数组字段</p>
    <div id="type-list-ui" style="max-height:200px;overflow-y:auto;margin-bottom:12px"></div>
    <div style="display:flex;gap:6px;align-items:center">
      <input id="new-type-name" placeholder="新类型名（英文，如 action_buttons）" style="flex:1;background:#0c0c18;border:1px solid #2a2a50;border-radius:4px;color:#dde;padding:6px 9px;font-size:12px"/>
      <button class="tbtn red" onclick="confirmAddType()">+ 添加</button>
    </div>
    <div class="modal-foot">
      <button class="tbtn red" onclick="closeTypeModal()">关闭</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  核心数据结构
//
//  elements: 所有可视元素的数组
//    { id, name, typeKey, color, x, y, w, h, visible }
//
//  types: 类型表（决定 JSON 输出结构）
//    { key, label, color }
//
//  JSON 输出时：相同 typeKey 的元素聚合到同名数组
// ══════════════════════════════════════════════════════════════════

const ASSET_W = 1200, ASSET_H = 665;
let zoom = 1, bgImage = null, canvasW = ASSET_W, canvasH = ASSET_H;
let selectedId = null;
let domEls = {};   // id -> DOM div
let snapEnabled = true;
const SNAP_THRESHOLD = () => parseInt(document.getElementById('snap-dist').value) || 8;

// ── 调色板
const PALETTE = ['#e94560','#4caf50','#2196f3','#ff9800','#9c27b0','#00bcd4','#ff5722','#607d8b','#f06292','#aed581'];
let addColorPicked = PALETTE[0];

// ── 类型表（预置）
let types = [
  { key: 'layout_regions', label: '布局区域', color: '#64b4ff' },
  { key: 'action_buttons', label: '动作按钮', color: '#4caf50' },
  { key: 'item_slots',     label: '物品槽',   color: '#ffc850' },
  { key: 'navigation',     label: '导航',     color: '#607d8b' },
];

// ── 元素列表（预置，来自原始 JSON）
let elements = [
  { id:'el_item_list',  name:'物品列表区',  typeKey:'layout_regions', color:'#64b4ff', x:120, y:48,  w:360, h:472, visible:true },
  { id:'el_detail',     name:'详情区',      typeKey:'layout_regions', color:'#ffc850', x:516, y:48,  w:600, h:458, visible:true },
  { id:'el_slot_0',     name:'物品槽 1',    typeKey:'item_slots',     color:'#a6e3a1', x:120, y:448, w:360, h:72,  visible:true },
  { id:'el_slot_1',     name:'物品槽 2',    typeKey:'item_slots',     color:'#a6e3a1', x:120, y:368, w:360, h:72,  visible:true },
  { id:'el_slot_2',     name:'物品槽 3',    typeKey:'item_slots',     color:'#a6e3a1', x:120, y:288, w:360, h:72,  visible:true },
  { id:'el_slot_3',     name:'物品槽 4',    typeKey:'item_slots',     color:'#a6e3a1', x:120, y:208, w:360, h:72,  visible:true },
  { id:'el_slot_4',     name:'物品槽 5',    typeKey:'item_slots',     color:'#a6e3a1', x:120, y:128, w:360, h:72,  visible:true },
  { id:'el_slot_5',     name:'物品槽 6',    typeKey:'item_slots',     color:'#a6e3a1', x:120, y:48,  w:360, h:72,  visible:true },
  { id:'el_btn_equip',  name:'装备',        typeKey:'action_buttons', color:'#4caf50', x:516, y:10,  w:120, h:36,  visible:true },
  { id:'el_btn_use',    name:'使用',        typeKey:'action_buttons', color:'#2196f3', x:652, y:10,  w:120, h:36,  visible:true },
  { id:'el_btn_cancel', name:'取消',        typeKey:'action_buttons', color:'#ff5722', x:788, y:10,  w:120, h:36,  visible:true },
  { id:'el_btn_back',   name:'返回',        typeKey:'navigation',     color:'#607d8b', x:924, y:10,  w:120, h:36,  visible:true },
];

let idCounter = 100;
function newId() { return 'el_' + (++idCounter); }

// ══════════════════════════════════════════════════════════════════
//  坐标转换（asset 坐标系：左下角原点，Y 向上）
// ══════════════════════════════════════════════════════════════════
function a2s(ax, ay, aw, ah) {
  return { left: ax*zoom, top: (ASSET_H-ay-ah)*zoom, width: aw*zoom, height: ah*zoom };
}
function s2a(cssL, cssT, cssW, cssH) {
  return {
    x: Math.round(cssL/zoom),
    y: Math.round(ASSET_H - cssT/zoom - cssH/zoom),
    w: Math.round(cssW/zoom),
    h: Math.round(cssH/zoom)
  };
}

// ══════════════════════════════════════════════════════════════════
//  自动对齐（吸附）
// ══════════════════════════════════════════════════════════════════
let snapLines = [];  // [{type:'x'|'y', val}]

// 收集所有其他元素在 CSS 坐标系下的参考线集合
function collectRefLines(movingId) {
  const xRefs = [], yRefs = [];
  elements.forEach(el => {
    if (el.id === movingId || !el.visible) return;
    const css = a2s(el.x, el.y, el.w, el.h);
    const eL = css.left, eR = eL+css.width,  eCx = eL+css.width/2;
    const eT = css.top,  eB = eT+css.height, eCy = eT+css.height/2;
    xRefs.push(eL, eR, eCx);
    yRefs.push(eT, eB, eCy);
  });
  return { xRefs, yRefs };
}

// 对单个值做吸附，返回 { val: 吸附后值, line: 参考线坐标|null }
function snapValue(val, refs, thr) {
  let best = thr + 1, snapped = val, line = null;
  refs.forEach(ref => {
    const d = Math.abs(val - ref);
    if (d < best) { best = d; snapped = ref; line = ref; }
  });
  return { val: snapped, line };
}

// 整体移动时的吸附（同时吸附 L/T，4 条边 + 中线均参与）
function getSnapLines(movingId, cssL, cssT, cssW, cssH) {
  if (!snapEnabled) return { l: cssL, t: cssT, lines: [] };
  const thr = SNAP_THRESHOLD() * zoom;
  const mR = cssL+cssW, mCx = cssL+cssW/2;
  const mB = cssT+cssH, mCy = cssT+cssH/2;

  const { xRefs, yRefs } = collectRefLines(movingId);

  // X 方向：左边、右边、中线都尝试，取最近的
  let bestDx = thr+1, snapL = cssL, lineX = null;
  [[cssL,0],[mR,-cssW],[mCx,-cssW/2]].forEach(([mv, offset]) => {
    const r = snapValue(mv, xRefs, thr);
    if (r.line !== null) {
      const d = Math.abs(mv - r.line);
      if (d < bestDx) { bestDx=d; snapL=r.line+offset; lineX=r.line; }
    }
  });

  // Y 方向：上边、下边、中线
  let bestDy = thr+1, snapT = cssT, lineY = null;
  [[cssT,0],[mB,-cssH],[mCy,-cssH/2]].forEach(([mv, offset]) => {
    const r = snapValue(mv, yRefs, thr);
    if (r.line !== null) {
      const d = Math.abs(mv - r.line);
      if (d < bestDy) { bestDy=d; snapT=r.line+offset; lineY=r.line; }
    }
  });

  const lines = [];
  if (lineX !== null) lines.push({type:'x', val: lineX});
  if (lineY !== null) lines.push({type:'y', val: lineY});
  return { l: snapL, t: snapT, lines };
}

// Resize 时的吸附：只对正在被拖动的那条边做吸附
// dir: 'nw'|'n'|'ne'|'e'|'se'|'s'|'sw'|'w'
// 返回 { L, T, W, H, lines }
function getResizeSnap(movingId, dir, L, T, W, H) {
  if (!snapEnabled) return { L, T, W, H, lines:[] };
  const thr = SNAP_THRESHOLD() * zoom;
  const { xRefs, yRefs } = collectRefLines(movingId);
  const lines = [];

  // 右边被拖 (e/ne/se)
  if (dir.includes('e')) {
    const R = L + W;
    const s = snapValue(R, xRefs, thr);
    if (s.line !== null) {
      W = Math.max(20, s.line - L);
      lines.push({type:'x', val: s.line});
    }
  }
  // 左边被拖 (w/nw/sw)
  if (dir.includes('w')) {
    const s = snapValue(L, xRefs, thr);
    if (s.line !== null) {
      const newL = s.line;
      W = Math.max(20, (L+W) - newL);
      L = newL;
      lines.push({type:'x', val: s.line});
    }
  }
  // 下边被拖 (s/se/sw)  — CSS Y 向下，bottom = T+H
  if (dir.includes('s')) {
    const B = T + H;
    const s = snapValue(B, yRefs, thr);
    if (s.line !== null) {
      H = Math.max(10, s.line - T);
      lines.push({type:'y', val: s.line});
    }
  }
  // 上边被拖 (n/nw/ne)
  if (dir.includes('n')) {
    const s = snapValue(T, yRefs, thr);
    if (s.line !== null) {
      const newT = s.line;
      H = Math.max(10, (T+H) - newT);
      T = newT;
      lines.push({type:'y', val: s.line});
    }
  }

  return { L, T, W, H, lines };
}

function renderSnapLines(lines) {
  document.querySelectorAll('.snap-line').forEach(e=>e.remove());
  const overlay = document.getElementById('overlay');
  lines.forEach(ln => {
    const d = document.createElement('div');
    d.className = 'snap-line ' + (ln.type==='x' ? 'snap-line-x' : 'snap-line-y');
    if (ln.type==='x') d.style.left = ln.val+'px';
    else d.style.top = ln.val+'px';
    overlay.appendChild(d);
  });
}

// ══════════════════════════════════════════════════════════════════
//  渲染 overlay
// ══════════════════════════════════════════════════════════════════
function renderOverlay() {
  const overlay = document.getElementById('overlay');
  overlay.style.width  = canvasW+'px';
  overlay.style.height = canvasH+'px';

  // 标记哪些 el id 还存在
  const liveIds = new Set(elements.map(e=>e.id));

  // 清除已删除的 DOM
  Object.keys(domEls).forEach(id => {
    if (!liveIds.has(id)) { domEls[id]?.remove(); delete domEls[id]; }
  });

  elements.forEach(el => {
    const css = a2s(el.x, el.y, el.w, el.h);
    const typeColor = (types.find(t=>t.key===el.typeKey)||{}).color || '#888';
    const strokeColor = el.color || typeColor;
    const fillColor = hexToFill(strokeColor, 0.12);

    let div = domEls[el.id];
    if (!div) {
      div = document.createElement('div');
      div.className = 'dbox';
      div.dataset.id = el.id;

      const lbl = document.createElement('div');
      lbl.className = 'blabel';
      div.appendChild(lbl);

      addResizeHandles(div, el.id);
      makeDraggable(div, el.id);
      div.addEventListener('mousedown', e => {
        if (!e.target.classList.contains('rh')) selectEl(el.id);
      });

      overlay.appendChild(div);
      domEls[el.id] = div;
    }

    div.style.cssText = `
      left:${css.left}px; top:${css.top}px;
      width:${css.width}px; height:${css.height}px;
      background:${fillColor};
      border-color:${strokeColor};
      display:${el.visible ? '' : 'none'};
    `;
    div.querySelector('.blabel').textContent = `${el.name} (${el.w}×${el.h})`;
    div.classList.toggle('sel', el.id === selectedId);
  });
}

function hexToFill(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ══════════════════════════════════════════════════════════════════
//  拖拽
// ══════════════════════════════════════════════════════════════════
function makeDraggable(div, id) {
  div.addEventListener('mousedown', e => {
    if (e.target.classList.contains('rh')) return;
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    const startL = parseFloat(div.style.left)||0;
    const startT = parseFloat(div.style.top)||0;
    const W = parseFloat(div.style.width), H = parseFloat(div.style.height);

    const onMove = e => {
      let newL = startL + e.clientX - startX;
      let newT = startT + e.clientY - startY;
      newL = Math.max(0, Math.min(canvasW-W, newL));
      newT = Math.max(0, Math.min(canvasH-H, newT));

      const snap = getSnapLines(id, newL, newT, W, H);
      newL = Math.max(0, Math.min(canvasW-W, snap.l));
      newT = Math.max(0, Math.min(canvasH-H, snap.t));

      div.style.left = newL+'px';
      div.style.top  = newT+'px';
      renderSnapLines(snap.lines);

      const ar = s2a(newL, newT, W, H);
      const el = elements.find(e=>e.id===id);
      if (el) { el.x=ar.x; el.y=ar.y; }
      updateJsonOutput(); updatePropsPanel();
      div.querySelector('.blabel').textContent = `${el?.name||''} (${el?.w}×${el?.h})`;
    };

    const onUp = () => {
      renderSnapLines([]);
      renderOverlay(); updatePropsPanel();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ══════════════════════════════════════════════════════════════════
//  8 方向 resize
// ══════════════════════════════════════════════════════════════════
function addResizeHandles(div, id) {
  ['nw','n','ne','e','se','s','sw','w'].forEach(dir => {
    const h = document.createElement('div');
    const isC = dir.length===2;
    h.className = `rh ${isC?'rh-corner':'rh-edge-'+(dir==='n'||dir==='s'?'h':'v')} rh-${dir}`;
    h.title = {nw:'左上',n:'上',ne:'右上',e:'右',se:'右下',s:'下',sw:'左下',w:'左'}[dir];
    div.appendChild(h);
    h.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      selectEl(id);
      const sX=e.clientX, sY=e.clientY;
      const sL=parseFloat(div.style.left), sT=parseFloat(div.style.top);
      const sW=parseFloat(div.style.width), sH=parseFloat(div.style.height);

      const onMove = e => {
        const dx=e.clientX-sX, dy=e.clientY-sY;
        let L=sL,T=sT,W=sW,H=sH;
        if (dir.includes('e')) W = Math.max(20, sW+dx);
        if (dir.includes('w')) { const d=Math.min(dx,sW-20); L=sL+d; W=sW-d; }
        if (dir.includes('s')) H = Math.max(10, sH+dy);
        if (dir.includes('n')) { const d=Math.min(dy,sH-10); T=sT+d; H=sH-d; }

        // resize 吸附：只对被拖动的边做对齐
        const snapped = getResizeSnap(id, dir, L, T, W, H);
        L=snapped.L; T=snapped.T; W=snapped.W; H=snapped.H;
        renderSnapLines(snapped.lines);

        div.style.left=L+'px'; div.style.top=T+'px';
        div.style.width=W+'px'; div.style.height=H+'px';
        const ar = s2a(L,T,W,H);
        const el = elements.find(e=>e.id===id);
        if (el) { el.x=ar.x; el.y=ar.y; el.w=ar.w; el.h=ar.h; }
        updateJsonOutput(); updatePropsPanel();
        div.querySelector('.blabel').textContent = `${el?.name||''} (${ar.w}×${ar.h})`;
      };
      const onUp = () => {
        renderSnapLines([]);   // 清除参考线
        renderOverlay();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// ══════════════════════════════════════════════════════════════════
//  选中 → 属性面板
// ══════════════════════════════════════════════════════════════════
function selectEl(id) {
  selectedId = id;
  renderOverlay();
  buildSidebar();
  updatePropsPanel();
}

function updatePropsPanel() {
  const panel = document.getElementById('props-panel');
  const fields = document.getElementById('props-fields');
  const title  = document.getElementById('props-title');
  if (!selectedId) { panel.classList.add('hidden'); return; }
  const el = elements.find(e=>e.id===selectedId);
  if (!el) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');
  title.textContent = el.name;
  fields.innerHTML = '';
  [['X（左）','x'],['Y（下）','y'],['宽度','w'],['高度','h']].forEach(([lbl,prop])=>{
    const row = document.createElement('div');
    row.className = 'prow';
    const lab = document.createElement('label'); lab.textContent = lbl;
    const inp = document.createElement('input'); inp.type='number'; inp.value=Math.round(el[prop]);
    inp.addEventListener('change', ()=>{
      el[prop] = parseFloat(inp.value)||0;
      renderOverlay(); updateJsonOutput();
    });
    row.appendChild(lab); row.appendChild(inp);
    fields.appendChild(row);
  });
}

// ══════════════════════════════════════════════════════════════════
//  侧边栏
// ══════════════════════════════════════════════════════════════════
function buildSidebar() {
  const scr = document.getElementById('sidebar-scroll');
  scr.innerHTML = '';

  types.forEach(tp => {
    const group = elements.filter(e=>e.typeKey===tp.key);

    const header = document.createElement('div');
    header.className = 'type-header';
    const dot = document.createElement('div');
    dot.className = 'type-dot';
    dot.style.background = tp.color;
    const name = document.createElement('span');
    name.className = 'type-name';
    name.textContent = `${tp.label} (${tp.key})`;
    header.appendChild(dot);
    header.appendChild(name);

    // 类型删除（只有该类型无元素时才可删）
    const del = document.createElement('span');
    del.className = 'type-del-btn';
    del.textContent = '✕ 删类型';
    del.title = group.length > 0 ? `还有 ${group.length} 个元素，无法删除` : '删除此类型';
    del.style.opacity = group.length > 0 ? '.3' : '.6';
    del.style.cursor  = group.length > 0 ? 'not-allowed' : 'pointer';
    del.addEventListener('click', ()=>{
      if (group.length > 0) { showHint(`还有 ${group.length} 个元素，请先删除`); return; }
      types = types.filter(t=>t.key!==tp.key);
      buildSidebar(); updateJsonOutput();
      showHint(`类型「${tp.label}」已删除`);
    });
    header.appendChild(del);
    scr.appendChild(header);

    // 元素行
    group.forEach(el => {
      const row = document.createElement('div');
      row.className = 'el-row' + (el.id===selectedId?' active':'');

      const dot2 = document.createElement('div');
      dot2.className = 'el-dot';
      dot2.style.background = el.color;

      const nm = document.createElement('span');
      nm.className = 'el-name';
      nm.textContent = el.name;

      // 可见性
      const eye = document.createElement('span');
      eye.className = 'el-ic';
      eye.textContent = el.visible ? '👁' : '🚫';
      eye.title = '切换可见';
      eye.addEventListener('click', e=>{
        e.stopPropagation();
        el.visible = !el.visible;
        eye.textContent = el.visible ? '👁' : '🚫';
        renderOverlay();
      });

      // 删除
      const delEl = document.createElement('span');
      delEl.className = 'el-ic el-del';
      delEl.textContent = '✕';
      delEl.title = '删除此元素';
      delEl.addEventListener('click', e=>{
        e.stopPropagation();
        deleteElement(el.id);
      });

      row.append(dot2, nm, eye, delEl);
      row.addEventListener('click', ()=>selectEl(el.id));
      scr.appendChild(row);
    });

    // 该类型下的"新增"快捷行
    const addRow = document.createElement('div');
    addRow.style.cssText = 'padding:3px 6px 6px 14px';
    const addBtn = document.createElement('button');
    addBtn.className = 'tbtn';
    addBtn.style.cssText = 'font-size:10px;padding:2px 8px;width:100%';
    addBtn.textContent = `＋ 在「${tp.label}」中新增`;
    addBtn.addEventListener('click', ()=> openAddModal(tp.key));
    addRow.appendChild(addBtn);
    scr.appendChild(addRow);
  });
}

// ══════════════════════════════════════════════════════════════════
//  新增 / 删除元素
// ══════════════════════════════════════════════════════════════════
function deleteElement(id) {
  const el = elements.find(e=>e.id===id);
  const name = el?.name || id;
  elements = elements.filter(e=>e.id!==id);
  if (selectedId===id) selectedId=null;
  if (domEls[id]) { domEls[id].remove(); delete domEls[id]; }
  renderOverlay(); buildSidebar(); updateJsonOutput(); updatePropsPanel();
  showHint(`已删除「${name}」`);
}

// 新增弹窗
let addModalDefaultType = null;
function openAddModal(typeKey) {
  addModalDefaultType = typeKey || null;
  // 填充类型下拉
  const sel = document.getElementById('add-type');
  sel.innerHTML = '';
  types.forEach(t=>{
    const opt = document.createElement('option');
    opt.value = t.key; opt.textContent = `${t.label}（${t.key}）`;
    if (t.key === typeKey) opt.selected = true;
    sel.appendChild(opt);
  });
  // 颜色选择
  addColorPicked = PALETTE[elements.length % PALETTE.length];
  renderColorRow();
  document.getElementById('add-name').value = '';
  document.getElementById('add-modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('add-name').focus(), 50);
}
function closeAddModal() {
  document.getElementById('add-modal').classList.add('hidden');
}
function renderColorRow() {
  const row = document.getElementById('add-color-row');
  row.innerHTML = '';
  PALETTE.forEach(c=>{
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c===addColorPicked?' picked':'');
    sw.style.background = c;
    sw.addEventListener('click', ()=>{
      addColorPicked = c;
      document.getElementById('add-color-val').value = c;
      renderColorRow();
    });
    row.appendChild(sw);
  });
}
function confirmAdd() {
  const name = document.getElementById('add-name').value.trim();
  if (!name) { showHint('请输入元素名称'); return; }
  const typeKey = document.getElementById('add-type').value;
  const color   = addColorPicked;
  // 默认放在画布中央
  const el = { id: newId(), name, typeKey, color, x:300, y:200, w:180, h:60, visible:true };
  elements.push(el);
  closeAddModal();
  renderOverlay(); buildSidebar(); updateJsonOutput();
  selectEl(el.id);
  showHint(`已新增「${name}」`);
}

// ══════════════════════════════════════════════════════════════════
//  类型管理弹窗
// ══════════════════════════════════════════════════════════════════
function openTypeModal() {
  renderTypeList();
  document.getElementById('type-modal').classList.remove('hidden');
}
function closeTypeModal() {
  document.getElementById('type-modal').classList.add('hidden');
  buildSidebar();
}
function renderTypeList() {
  const ul = document.getElementById('type-list-ui');
  ul.innerHTML = '';
  types.forEach((tp, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #2a2a50';
    const dot = document.createElement('div');
    dot.style.cssText = `width:10px;height:10px;border-radius:50%;background:${tp.color};flex-shrink:0`;
    const info = document.createElement('span');
    info.style.cssText = 'flex:1;font-size:12px';
    info.textContent = `${tp.label}  →  JSON key: "${tp.key}"`;
    const cnt = elements.filter(e=>e.typeKey===tp.key).length;
    const cnts = document.createElement('span');
    cnts.style.cssText = 'font-size:11px;color:#888';
    cnts.textContent = `${cnt} 个元素`;
    const delBtn = document.createElement('span');
    delBtn.className = 'type-del-btn';
    delBtn.textContent = '✕';
    delBtn.style.cssText = cnt>0 ? 'opacity:.3;cursor:not-allowed' : 'opacity:.7;cursor:pointer';
    delBtn.addEventListener('click', ()=>{
      if (cnt>0){ showHint(`还有 ${cnt} 个元素，先删元素`); return; }
      types.splice(i,1);
      renderTypeList();
      showHint(`类型删除成功`);
    });
    row.append(dot, info, cnts, delBtn);
    ul.appendChild(row);
  });
}
function confirmAddType() {
  let key = document.getElementById('new-type-name').value.trim().replace(/\s+/g,'_');
  if (!key) { showHint('请输入类型名'); return; }
  if (types.find(t=>t.key===key)) { showHint('该类型名已存在'); return; }
  const color = PALETTE[types.length % PALETTE.length];
  const label = key.replace(/_/g,' ');
  types.push({ key, label, color });
  document.getElementById('new-type-name').value = '';
  renderTypeList();
  showHint(`已添加类型「${label}」`);
}

// ══════════════════════════════════════════════════════════════════
//  JSON 输出（按类型分组成数组）
// ══════════════════════════════════════════════════════════════════
function buildJson() {
  const out = {};
  types.forEach(tp => {
    const group = elements.filter(e=>e.typeKey===tp.key);
    if (group.length === 0) return;
    out[tp.key] = group.map(el => ({
      name: el.name,
      x: el.x, y: el.y, width: el.w, height: el.h,
      color: el.color
    }));
  });
  return out;
}

function updateJsonOutput() {
  const json = JSON.stringify(buildJson(), null, 2);
  document.getElementById('json-output').innerHTML = syntaxHighlight(json);
}

function syntaxHighlight(json) {
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m=>{
      let c='jn';
      if (/^"/.test(m)) c=/:$/.test(m)?'jk':'js';
      else if (/true|false/.test(m)) c='jb';
      else if (/null/.test(m)) c='jnl';
      return `<span class="${c}">${m}</span>`;
    });
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(buildJson(),null,2))
    .then(()=>showHint('已复制到剪贴板 ✓'));
}
function downloadJson() {
  const b = new Blob([JSON.stringify(buildJson(),null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='layout.json'; a.click(); URL.revokeObjectURL(a.href);
  showHint('已下载 layout.json ✓');
}

// ══════════════════════════════════════════════════════════════════
//  加载外部 JSON（还原元素列表）
// ══════════════════════════════════════════════════════════════════
document.getElementById('json-file').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      elements=[];
      // 自动推导类型
      Object.keys(data).forEach(key=>{
        if (!Array.isArray(data[key])) return;
        if (!types.find(t=>t.key===key)) {
          types.push({key, label:key.replace(/_/g,' '), color:PALETTE[types.length%PALETTE.length]});
        }
        data[key].forEach((item,i)=>{
          elements.push({
            id: newId(),
            name: item.name || `${key}_${i}`,
            typeKey: key,
            color: item.color || (types.find(t=>t.key===key)?.color||'#888'),
            x: item.x||0, y: item.y||0, w: item.width||100, h: item.height||40,
            visible: true
          });
        });
      });
      // 清除旧 DOM
      Object.values(domEls).forEach(d=>d.remove());
      Object.keys(domEls).forEach(k=>delete domEls[k]);
      selectedId=null;
      renderOverlay(); buildSidebar(); updateJsonOutput();
      showHint('JSON 加载成功 ✓');
    } catch(err) { showHint('解析失败：'+err.message); }
  };
  rd.readAsText(f);
});

// ══════════════════════════════════════════════════════════════════
//  缩放
// ══════════════════════════════════════════════════════════════════
function setZoom(z) {
  zoom = Math.max(.2, Math.min(3, z));
  document.getElementById('zoom-val').textContent = Math.round(zoom*100)+'%';
  canvasW = ASSET_W*zoom; canvasH = ASSET_H*zoom;
  const cont = document.getElementById('canvas-container');
  const cv   = document.getElementById('bg-canvas');
  cont.style.width=canvasW+'px'; cont.style.height=canvasH+'px';
  cv.width=canvasW; cv.height=canvasH;
  drawBackground(); renderOverlay();
}

// ══════════════════════════════════════════════════════════════════
//  背景图
// ══════════════════════════════════════════════════════════════════
function drawBackground() {
  const cv=document.getElementById('bg-canvas'), ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  if (bgImage) { ctx.drawImage(bgImage,0,0,canvasW,canvasH); return; }
  ctx.fillStyle='#0c1020'; ctx.fillRect(0,0,canvasW,canvasH);
  ctx.strokeStyle='#181830'; ctx.lineWidth=1;
  const step=40*zoom;
  for(let x=0;x<canvasW;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvasH);ctx.stroke();}
  for(let y=0;y<canvasH;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvasW,y);ctx.stroke();}
  ctx.fillStyle='#2a3a5a'; ctx.font=`${13*zoom}px monospace`;
  ctx.fillText('← 加载背景图（右上角）或直接开始布局', 16*zoom, 26*zoom);
}

document.getElementById('bg-file').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>{ bgImage=img; drawBackground(); showHint('背景图加载成功 ✓'); };
  img.src=url;
});

// ══════════════════════════════════════════════════════════════════
//  对齐开关
// ══════════════════════════════════════════════════════════════════
document.getElementById('snap-cb').addEventListener('change', e=>{
  snapEnabled = e.target.checked;
  showHint(snapEnabled ? '自动对齐已开启' : '自动对齐已关闭');
});

// ══════════════════════════════════════════════════════════════════
//  提示
// ══════════════════════════════════════════════════════════════════
let hintT=null;
function showHint(msg) {
  const el=document.getElementById('hint');
  el.textContent=msg; el.classList.add('show');
  if(hintT) clearTimeout(hintT);
  hintT=setTimeout(()=>el.classList.remove('show'),2400);
}

// ══════════════════════════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════════════════════════
function init() {
  setZoom(.85);
  buildSidebar();
  updateJsonOutput();
  // 尝试自动加载背景图
  const img=new Image();
  img.onload=()=>{ bgImage=img; drawBackground(); showHint('背景图自动加载成功 ✓'); };
  img.onerror=()=>drawBackground();
  img.src='../../assets/pic/菜单框架/游戏物品菜单.png';
}
init();
</script>
